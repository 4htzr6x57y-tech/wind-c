function buildDeltaCard(result = {}) {
  const delta = result.delta || {};
  const changes = Array.isArray(delta.changes) ? delta.changes : [];
  const changedApps = changes.map(change => change.id).filter(Boolean);
  const newApps = changes.filter(change => change.type === 'added').map(change => change.id);
  const removedApps = changes.filter(change => change.type === 'removed').map(change => change.id);
  const regressions = changes.filter(change => change.type === 'regression').map(change => change.id);
  const improvements = changes.filter(change => change.type === 'improvement').map(change => change.id);
  return {
    available: !!delta.available,
    status: delta.status || 'missing',
    baselineSignature: delta.baselineSignature || null,
    currentSignature: result.signature || null,
    changedApps,
    newApps,
    removedApps,
    regressions,
    improvements,
    summary: delta.available
      ? (changes.length ? changes.map(change => change.id + ':' + change.type).join(', ') : 'No changes from baseline.')
      : 'No baseline saved; save only when the human wants this state as the comparison point.',
  };
}

function buildHumanOutcomeCard(result = {}) {
  const session = readSessionLogSummary(1);
  const latest = session.available ? session.entries[0] : null;
  const files = Array.isArray(latest?.filesChanged) ? latest.filesChanged : [];
  const touchedApps = files.map(file => {
    const normalized = String(file).replace(/\\/g, '/');
    const app = APPS.find(item => normalized.endsWith(item.url.replace('./', '')));
    return app?.id || null;
  }).filter(Boolean);
  const otherAppsOk = (result.apps || [])
    .filter(app => !touchedApps.includes(app.id))
    .every(app => app.level === 'ok' || app.knownWarning);
  const focus = result.workbench?.focus?.id || result.aiBrief?.reviewOrder?.[0] || null;
  return {
    latestWork: latest,
    filesChanged: files,
    touchedApps: [...new Set(touchedApps)],
    otherAppsOk,
    summary: latest
      ? [latest.outcome || 'note', latest.intent || latest.detail || 'recent work'].join(' / ')
      : 'No recent session log entry.',
    nextHumanCheck: focus
      ? 'Open ' + focus + ' and verify the requested workflow.'
      : 'Suite is clear; optionally save baseline if this state is intended.',
  };
}

function buildOperationalInsights(result = {}) {
  return {
    contractVersion: 1,
    generatedAt: result.generatedAt || new Date().toISOString(),
    aiFirstSteps: WATCHTOWER_CONFIG.agent.aiFirstSteps.map(item => ({ ...item })),
    deltaCard: buildDeltaCard(result),
    diagnosticCapabilityMap: buildDiagnosticCapabilityMap(result),
    appAdditionTemplate: buildAppAdditionTemplate(),
    appMetrics: buildAppMetrics(result),
    humanOutcomeCard: buildHumanOutcomeCard(result),
  };
}

function buildArchitectureScore(result) {
  const failures = result.apps.filter(app => app.level === 'bad').length;
  const newWarnings = result.apps.filter(app => app.level === 'warn' && !app.knownWarning).length;
  const knownWarnings = result.apps.filter(app => app.knownWarning).length;
  const protocolCoverage = result.apps.filter(app => {
    const config = APPS.find(item => item.id === app.id);
    return !!config?.diagnostics?.protocol;
  }).length;
  const breakdown = {
    base: 70,
    protocolCoverage: protocolCoverage * 4,
    agentCard: result.agentCard ? 4 : 0,
    workbench: result.workbench ? 4 : 0,
    handoffPacket: result.handoffPacket ? 4 : 0,
    failurePenalty: -(failures * 18),
    newWarningPenalty: -(newWarnings * 8),
    knownWarningPenalty: -(knownWarnings * 2),
  };
  const rawScore = Math.max(0, Math.min(100,
    breakdown.base
    + breakdown.protocolCoverage
    + breakdown.agentCard
    + breakdown.workbench
    + breakdown.handoffPacket
    + breakdown.failurePenalty
    + breakdown.newWarningPenalty
    + breakdown.knownWarningPenalty
  ));
  const score = failures
    ? Math.min(rawScore, 59)
    : newWarnings
      ? Math.min(rawScore, 79)
      : knownWarnings
        ? Math.min(rawScore, 92)
        : rawScore;
  const cap = failures ? 59 : newWarnings ? 79 : knownWarnings ? 92 : null;
  return {
    contractVersion: 1,
    score,
    confidence: failures ? 'LOW' : newWarnings ? 'MEDIUM' : knownWarnings ? 'HIGH-WITH-KNOWN-WARNINGS' : 'HIGH',
    scoreBreakdown: {
      ...breakdown,
      rawBeforeCap: rawScore,
      cap,
      final: score,
    },
    reasons: [
      '+ portable diagnostics protocols',
      '+ baseline and signature contract',
      '+ AI workbench and handoff packet',
      knownWarnings ? '- known warnings require acknowledgement' : '+ no known warnings in active result',
      newWarnings ? '- new warnings need triage' : '+ no new warnings detected',
      failures ? '- blockers remain' : '+ no blockers detected',
    ],
  };
}

function formatBriefForAgent(result, agentName) {
  const focus = result.workbench?.focus;
  const safety = result.safetyMap?.apps?.find(app => app.id === focus?.id)
    || result.safetyMap?.apps?.[0];
  const lines = [
    agentName.toUpperCase() + ' BRIEF',
    'PROJECT: ' + result.project.title,
    'STATUS: ' + result.status,
    'AI CONFIDENCE: ' + result.architectureScore.confidence,
    'BASELINE: ' + (result.delta?.available ? result.delta.status : 'missing'),
    'FOCUS: ' + (focus ? focus.id + ' / ' + focus.issueCode : 'none'),
    '',
    'SAFE:',
    ...((safety?.safe || []).map(item => '- ' + item)),
    '',
    'MEDIUM:',
    ...((safety?.medium || []).map(item => '- ' + item)),
    '',
    'DANGER:',
    ...((safety?.danger || []).map(item => '- ' + item)),
    '',
    'EDIT ORDER:',
    ...(result.aiBrief.reviewOrder || []).map((id, index) => String(index + 1) + '. ' + id),
    '',
    'REQUIRED CHECKS:',
    ...((safety?.requiredChecks || []).map(item => '- ' + item)),
    '',
    'NEXT ACTION:',
    result.aiBrief.nextAction,
  ];
  return lines.join('\n');
}

function buildSessionBrief(result) {
  const focus = result.workbench?.focus;
  const baseline = result.delta?.available ? result.delta.status : 'missing';
  const verdict = result.aiBrief?.verdict || 'unknown';
  const focusLine = focus
    ? focus.id + ' / ' + focus.issueCode
    : 'none';
  const ts = result.generatedAt
    ? new Date(result.generatedAt).toLocaleString('ja-JP', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' })
    : '??';
  const line1 = result.project.title + ' / ' + result.status + ' / baseline:' + baseline + ' / focus:' + focusLine;
  const line2 = 'verdict:' + verdict + ' / score:' + (result.architectureScore?.score ?? '?') + ' / run:' + ts;
  const line3 = 'next: ' + (result.aiBrief?.nextAction || 'Run Watchtower.');
  return { line1, line2, line3, text: [line1, line2, line3].join('\n') };
}

function buildConversationStarter(result, agentName) {
  const focus = result.workbench?.focus;
  const baseline = result.delta?.available ? result.delta.status : 'missing';
  const verdict = result.aiBrief?.verdict || 'unknown';
  const levelLabel = String(result.level || 'unknown').toUpperCase();
  const baselineNote = baseline === 'unchanged'
    ? 'baseline unchanged'
    : baseline === 'missing'
      ? 'baseline missing'
      : 'baseline ' + baseline;
  const focusNote = focus
    ? 'focus ' + focus.id + ' (' + focus.issueCode + ')'
    : 'focus none';
  const nextNote = result.aiBrief?.nextAction || 'Run Watchtower.';
  return agentName + ': Watchtower ' + levelLabel + ' / ' + result.status + ' / ' +
    baselineNote + ' / ' + focusNote + ' / verdict:' + verdict + ' / next: ' + nextNote;
}

function matchTerms(text, terms) {
  const haystack = String(text || '').toLowerCase().trim();
  if (!haystack) return [];
  const compactHaystack = haystack.replace(/[^a-z0-9]+/g, '');
  // Tokens in the intent that carry actual meaning (4+ chars, not stop words)
  const stopTokens = new Set([
    'schema', 'state', 'text', 'copy', 'model', 'sync',
    'change', 'update', 'edit', 'modify', 'fix', 'add', 'remove',
    'the', 'and', 'for', 'with', 'from', 'this', 'that',
  ]);
  const intentTokens = haystack
    .split(/[^a-z0-9]+/)
    .filter(t => t.length >= 4 && !stopTokens.has(t));
  return terms.filter(term => {
    const raw = String(term || '').toLowerCase().trim();
    if (!raw) return false;
    const compact = raw.replace(/[^a-z0-9]+/g, '');
    // Exact phrase match — highest confidence
    if (haystack.includes(raw)) return true;
    // Compact match for hyphenated/spaced variants (e.g. "inverse solver" vs "inversesolver")
    if (compact.length >= 6 && compactHaystack.includes(compact)) return true;
    // Token match: ALL significant tokens in the term must appear in the intent
    // (prevents "labels" matching "chart labels" when intent is "change label color")
    const termTokens = raw
      .split(/[^a-z0-9]+/)
      .filter(t => t.length >= 5 && !stopTokens.has(t));
    if (termTokens.length >= 2) {
      // Multi-token term: require every token to appear in intent
      return termTokens.every(t => intentTokens.includes(t) || haystack.includes(t));
    }
    if (termTokens.length === 1) {
      // Single significant token: require exact token boundary match in intent
      return intentTokens.includes(termTokens[0]);
    }
    return false;
  });
}

// ── FOCUS PACKET ────────────────────────────────────────────
function buildFocusPacket(result) {
  const aiBrief = result.aiBrief || {};
  const workbench = result.workbench || {};
  const bugSummary = buildBugLedgerSummary(result);
  const focusIds = (aiBrief.reviewOrder || []).slice(0, 2);
  const skipIds = (result.apps || [])
    .filter(app => app.level === 'ok' && !focusIds.includes(app.id))
    .map(app => app.id);
  const urgentBugs = bugSummary.open.filter(entry =>
    focusIds.includes(entry.appId)
  ).slice(0, 3);
  const lines = [
    '── FOCUS PACKET ──',
    '今回やること: ' + (focusIds.length ? focusIds.join(', ') : 'なし（全部OK）'),
    '今回触らない: ' + (skipIds.length ? skipIds.join(', ') : 'なし'),
    '未解決バグ: ' + (urgentBugs.length
      ? urgentBugs.map(b => b.appId + '/' + b.issueCode).join(', ')
      : 'なし'),
    '触る順番: ' + (aiBrief.reviewOrder || []).join(' → '),
    'verdict: ' + (aiBrief.verdict || 'unknown'),
    'canFinish: ' + String(workbench.acceptance?.canFinish ?? '?'),
  ];
  return {
    contractVersion: 1,
    doNow: focusIds,
    skip: skipIds,
    urgentBugs,
    reviewOrder: aiBrief.reviewOrder || [],
    verdict: aiBrief.verdict || 'unknown',
    canFinish: workbench.acceptance?.canFinish ?? false,
    nextAction: aiBrief.nextAction || 'Run Watchtower.',
    text: lines.join('\n'),
  };
}

// ── DANGER WARNING ───────────────────────────────────────────
function buildDangerWarning(intent, result = null) {
  const assessment = assessChange(intent, result);
  const bugSummary = result ? buildBugLedgerSummary(result) : null;
  // 今回の編集意図に関係するバグ履歴
  const relatedBugs = (bugSummary?.open || []).filter(entry =>
    assessment.impactedApps.some(app => app.id === entry.appId)
  );
  if (assessment.risk === 'UNKNOWN' || !assessment.impactedApps.length) {
    return {
      contractVersion: 1,
      risk: 'UNKNOWN',
      safe: true,
      message: '「' + intent + '」はsafetyMapに直接マッチしませんでした。Watchtowerを実行してからもう一度確認してください。',
      relatedBugs: [],
      requiredChecks: [],
    };
  }
  const dangerApps = assessment.impactedApps.filter(app => app.risk === 'high');
  const mediumApps = assessment.impactedApps.filter(app => app.risk === 'medium');
  let message = '';
  if (dangerApps.length) {
    const zones = dangerApps.flatMap(app => app.matched.danger);
    message = '⚠️ 危険です。「' + intent + '」は ' +
      dangerApps.map(app => app.id).join(', ') +
      ' の danger ゾーン（' + zones.join(', ') + '）に触れます。' +
      '最小限の編集にして、必ず直後にWatchtowerを再実行してください。';
  } else if (mediumApps.length) {
    const zones = mediumApps.flatMap(app => app.matched.medium);
    message = '🟡 注意。「' + intent + '」は ' +
      mediumApps.map(app => app.id).join(', ') +
      ' の medium ゾーン（' + zones.join(', ') + '）に触れます。' +
      '変更後にWatchtowerを確認してください。';
  } else {
    message = '🟢 比較的安全です。「' + intent + '」は safe ゾーンの変更です。念のためWatchtowerを再実行してください。';
  }
  if (relatedBugs.length) {
    message += ' また、この領域には過去のバグ履歴があります: ' +
      relatedBugs.map(b => b.issueCode).join(', ') + '。';
  }
  return {
    contractVersion: 1,
    risk: assessment.risk,
    safe: dangerApps.length === 0,
    message,
    impactedApps: assessment.impactedApps.map(app => ({
      id: app.id,
      risk: app.risk,
      dangerMatches: app.matched.danger,
      mediumMatches: app.matched.medium,
    })),
    relatedBugs,
    requiredChecks: assessment.requiredChecks,
    warning: assessment.warning,
  };
}

function assessChange(intent, result = null) {
  const snapshot = result || {
    project: {
      title: WATCHTOWER_CONFIG.projectTitle,
      productName: WATCHTOWER_CONFIG.productName,
      baselineNamespace: WATCHTOWER_CONFIG.baselineNamespace,
    },
    apps: APPS.map(app => ({
      id: app.id,
      title: app.title,
      url: app.url,
      kind: app.kind,
      maturity: app.maturity,
      level: 'unknown',
      issueCode: 'not-run',
      knownWarning: false,
      reason: 'Watchtower has not run in this assessment.',
      healerHint: 'Run Watchtower for live diagnostics before editing.',
    })),
  };
  const safetyMap = result?.safetyMap || buildSafetyMap(snapshot);
  const impacts = safetyMap.apps.map(app => {
    const safeHits = matchTerms(intent, app.safe);
    const mediumHits = matchTerms(intent, app.medium);
    const dangerHits = matchTerms(intent, app.danger);
    const idHit = matchTerms(intent, [app.id, app.title]);
    const weight = dangerHits.length * 3 + mediumHits.length * 2 + safeHits.length + idHit.length * 2;
    if (!weight) return null;
    const risk = dangerHits.length ? 'high' : mediumHits.length ? 'medium' : 'low';
    return {
      id: app.id,
      title: app.title,
      url: app.url,
      risk,
      matched: { safe: safeHits, medium: mediumHits, danger: dangerHits, identity: idHit },
      requiredChecks: app.requiredChecks,
      weight,
    };
  }).filter(Boolean).sort((a, b) => {
    const rank = { high: 3, medium: 2, low: 1 };
    return rank[b.risk] - rank[a.risk] || b.weight - a.weight || a.id.localeCompare(b.id);
  });
  const fallbackFocus = result?.workbench?.focus?.id || APPS[0].id;
  const topRisk = impacts.some(item => item.risk === 'high')
    ? 'HIGH'
    : impacts.some(item => item.risk === 'medium')
      ? 'MEDIUM'
      : impacts.length
        ? 'LOW'
        : 'UNKNOWN';
  const reviewOrder = impacts.length ? impacts.map(item => item.id) : [fallbackFocus];
  return {
    contractVersion: 1,
    intent: String(intent || '').trim(),
    risk: topRisk,
    confidence: impacts.length ? 'matched-safety-map' : 'no-direct-match',
    impactedApps: impacts,
    reviewOrder,
    requiredChecks: [...new Set(impacts.flatMap(item => item.requiredChecks || []))],
    warning: topRisk === 'HIGH'
      ? 'High-risk change. Inspect danger matches and rerun Watchtower after the smallest possible edit.'
      : topRisk === 'MEDIUM'
        ? 'Medium-risk change. Check render/state sync and rerun relevant diagnostics.'
        : topRisk === 'LOW'
          ? 'Low-risk change. Still rerun Watchtower before handoff.'
          : 'No direct safety-map match. Run Watchtower and inspect workbench before editing.',
  };
}

function currentWatchtowerResult() {
  try {
    const parsed = JSON.parse(jsonEl?.textContent || 'null');
    return parsed && parsed.signature ? parsed : null;
  } catch (_) {
    return null;
  }
}

function inferHumanRequestedFocus(text, assessment, result = null) {
  const request = String(text || '').toLowerCase();
  const candidates = assessment.impactedApps || [];
  if (candidates.length !== 1) return null;
  const app = candidates[0];
  const explicitTokens = [
    app.id,
    app.title,
    ...(app.id === 'WC' ? ['winding calibrator', 'winding-calibrator', 'wc'] : []),
    ...(app.id === 'CD' ? ['coil designer', 'coil-designer', 'cd'] : []),
    ...(app.id === 'CC' ? ['coil calibrator', 'coil-calibrator', 'cc'] : []),
    ...(app.id === 'ECT-D' ? ['ect designer', 'ect-designer', 'ect-d'] : []),
    ...(app.id === 'WT' ? ['watchtower', 'wt'] : []),
  ].map(item => String(item || '').toLowerCase()).filter(Boolean);
  const explicit = explicitTokens.some(token => request.includes(token));
  if (!explicit) return null;
  const diagnosticFocus = result?.workbench?.focus || null;
  const blockers = (result?.apps || []).filter(item => item.level === 'bad');
  const newWarnings = (result?.apps || []).filter(item => item.level === 'warn' && !item.knownWarning);
  const onlyKnownWarnings = !blockers.length && !newWarnings.length;
  return {
    appId: app.id,
    appTitle: app.title,
    explicit,
    diagnosticFocus: diagnosticFocus ? {
      id: diagnosticFocus.id,
      issueCode: diagnosticFocus.issueCode,
      knownWarning: !!diagnosticFocus.knownWarning,
    } : null,
    canOverrideDiagnosticFocus: explicit && onlyKnownWarnings && assessment.risk !== 'HIGH',
    reason: explicit && onlyKnownWarnings
      ? 'Human explicitly requested this app, and current non-OK diagnostics are known warnings only.'
      : 'Human target was explicit, but blockers/new warnings or high risk still require pause.',
  };
}

function checkRequest(intent, result = null) {
  const text = String(intent || '').trim();
  const activeResult = result || currentWatchtowerResult();
  const assessment = assessChange(text, activeResult);
  const danger = buildDangerWarning(text, activeResult);
  const budget = activeResult?.editBudget || (activeResult ? buildEditBudget(activeResult) : buildEditBudget({
    aiBrief: { verdict:'investigate', reviewOrder: assessment.reviewOrder },
    workbench: { focus:null },
    apps: [],
    delta: { available:false },
    generatedAt: new Date().toISOString(),
  }));
  const forbiddenMap = activeResult?.forbiddenSurfaceMap || (activeResult ? buildForbiddenSurfaceMap(activeResult) : null);
  const impactedIds = assessment.impactedApps.map(app => app.id);
  const humanRequestedFocus = inferHumanRequestedFocus(text, assessment, activeResult);
  const forbiddenHits = forbiddenMap
    ? forbiddenMap.surfaces.map(surface => {
      const matches = matchTerms(text, surface.forbidden || []);
      const outsideFocus = impactedIds.includes(surface.appId)
        && surface.appId !== budget.focusApp
        && !(humanRequestedFocus?.canOverrideDiagnosticFocus && surface.appId === humanRequestedFocus.appId);
      return {
        id: surface.id,
        appId: surface.appId,
        matches,
        matchedForbidden: matches.length > 0,
        outsideBudgetFocus: outsideFocus,
        requiresExplicitUserIntent: surface.requiresExplicitUserIntent,
      };
    }).filter(hit => hit.matchedForbidden || hit.outsideBudgetFocus)
    : [];
  const riskRank = { UNKNOWN:0, SAFE:1, LOW:1, MEDIUM:2, HIGH:3 };
  // maxRisk:'safe' → SAFE:1 = LOW相当。undefinedになるとfalseになるので明示的に定義。
  const overBudgetRisk = (riskRank[assessment.risk] ?? 0) > (riskRank[String(budget.maxRisk || 'safe').toUpperCase()] ?? 0);
  const effectiveOverBudgetRisk = overBudgetRisk && !humanRequestedFocus?.canOverrideDiagnosticFocus;
  const touchesForbidden = forbiddenHits.some(hit => hit.matchedForbidden || hit.outsideBudgetFocus);
  const canProceed =
    !!text &&
    assessment.risk !== 'HIGH' &&
    !effectiveOverBudgetRisk &&
    !(touchesForbidden && !text.includes('明示') && !/explicit|force|danger|承認|基準/.test(text.toLowerCase()));
  const decision = canProceed
    ? humanRequestedFocus?.canOverrideDiagnosticFocus
      ? 'proceed-with-human-requested-focus'
      : 'proceed-with-budget'
    : 'pause-or-ask-human';
  const requiredBefore = [
    activeResult ? 'read-current-watchtower-result' : 'run-window.WATCHTOWER.run()',
    'read-result.editBudget',
    'read-result.forbiddenSurfaceMap',
  ];
  if (assessment.requiredChecks.length) requiredBefore.push(...assessment.requiredChecks);
  const requiredAfter = [
    'run-window.WATCHTOWER.runAndRender()',
    'record-window.WATCHTOWER.recordSessionLog()',
    'confirm-no-new-blockers',
    'compare-signature-and-baseline',
  ];
  return {
    contractVersion: 1,
    requestType: 'watchtower.requestCheck',
    intent: text,
    decision,
    canProceed,
    risk: assessment.risk,
    confidence: assessment.confidence,
    summary: canProceed
      ? humanRequestedFocus?.canOverrideDiagnosticFocus
        ? 'Proceed inside the human-requested app focus and run its required diagnostics.'
        : 'Proceed only inside editBudget and rerun Watchtower after the edit.'
      : 'Pause, narrow the request, or ask the human before editing.',
    impactedApps: assessment.impactedApps,
    reviewOrder: assessment.reviewOrder,
    humanRequestedFocus,
    editBudget: budget,
    forbiddenHits,
    dangerWarning: danger,
    requiredBefore: [...new Set(requiredBefore)],
    requiredAfter,
    stopIf: [
      ...budget.stopIf,
      'actual-change-needs-forbidden-surface',
      'new-diagnostics-failure-appears',
    ],
    notes: [
      'This is a pre-edit safety gate, not a guarantee that code will run without errors.',
      'Runtime or syntax errors are detected by the post-edit Watchtower run.',
    ],
    generatedAt: new Date().toISOString(),
  };
}

function buildHandoffPacket(result) {
  const focus = result.workbench?.focus;
  const repairQueue = result.workbench?.queues?.repair || [];
  const triageQueue = result.workbench?.queues?.triage || [];
  const acknowledged = result.workbench?.queues?.acknowledged || [];
  const regressionChanges = result.delta?.changes?.filter(change => change.type === 'regression') || [];
  const approval = readApproval();
  const approvalInfo = approval
    ? { approvedAt: approval.approvedAt, matchesCurrentRun: approval.signature === result.signature }
    : null;
  const lines = [
    'WATCHTOWER HANDOFF',
    'project: ' + result.project.title,
    'status: ' + result.status,
    'signature: ' + result.signature,
    'baseline: ' + (result.delta?.available ? result.delta.status : 'missing'),
    'verdict: ' + result.aiBrief.verdict,
    'actionPacket: ' + ((result.actionPacket?.mission || 'inspect-watchtower') + (result.actionPacket?.targetApp ? ' @' + result.actionPacket.targetApp : '')),
    'approval: ' + (approvalInfo ? approvalInfo.approvedAt + (approvalInfo.matchesCurrentRun ? ' [this run]' : ' [different run]') : 'none'),
    'focus: ' + (focus ? focus.id + ' / ' + focus.issueCode : 'none'),
    'aiFirstSteps: ' + WATCHTOWER_CONFIG.agent.aiFirstSteps.map(item => item.step + '.' + item.id).join(' -> '),
    'repairQueue: ' + (repairQueue.length ? repairQueue.join(', ') : 'none'),
    'triageQueue: ' + (triageQueue.length ? triageQueue.join(', ') : 'none'),
    'acknowledgedWarnings: ' + (acknowledged.length ? acknowledged.join(', ') : 'none'),
    'regressions: ' + (regressionChanges.length ? regressionChanges.map(change => change.id + ':' + change.before + '->' + change.after).join(', ') : 'none'),
    'canFinish: ' + String(result.workbench.acceptance.canFinish),
    'nextAction: ' + result.aiBrief.nextAction,
  ];
  if (result.operationalInsights?.humanOutcomeCard) {
    lines.push('humanOutcome: ' + result.operationalInsights.humanOutcomeCard.summary);
    lines.push('nextHumanCheck: ' + result.operationalInsights.humanOutcomeCard.nextHumanCheck);
  }
  if (result.operationalInsights?.deltaCard) {
    lines.push('impactSummary: ' + result.operationalInsights.deltaCard.summary);
  }
  const sessionLog = readSessionLogSummary(3);
  if (sessionLog.available) {
    lines.push('sessionLog:');
    sessionLog.entries.forEach(entry => lines.push('  - ' + formatSessionLogEntry(entry)));
  } else {
    lines.push('sessionLog: none');
  }
  return {
    contractVersion: 1,
    generatedAt: result.generatedAt,
    project: result.project,
    status: result.status,
    signature: result.signature,
    baseline: result.delta?.available ? result.delta.status : 'missing',
    verdict: result.aiBrief.verdict,
    approval: approvalInfo,
    focus,
    queues: result.workbench.queues,
    acceptance: result.workbench.acceptance,
    nextAction: result.aiBrief.nextAction,
    actionPacket: result.actionPacket || null,
    operationalInsights: result.operationalInsights || null,
    aiFirstSteps: WATCHTOWER_CONFIG.agent.aiFirstSteps.map(item => ({ ...item })),
    sessionLog,
    resumeInstructions: [
      'Read this handoffPacket before inspecting files.',
      'If sessionLog.entries exists, review recent work before deciding what to edit next.',
      'Check approval.approvedAt - if present and matchesCurrentRun is true, a human has signed off on this state.',
      'If canFinish is false, start with focus.url or queues.repair[0].',
      'If baseline is regression, inspect delta.changes before unrelated edits.',
      'After edits, rerun Watchtower and compare the new signature.',
    ],
    markdown: lines.join('\n'),
  };
}

async function runSuite(options = {}) {
  const results = [];
  for (const [index, app] of APPS.entries()) {
    if (options.renderProgress) {
      setProgress('<strong>' + (index + 1) + '/' + APPS.length + '</strong> ' + escapeHtml(app.id) + ' を確認中...');
      setStatus('診断中 ' + (index + 1) + '/' + APPS.length, 'ok');
    }
    try {
      const win = app.kind === 'self' ? window : await waitForFrame(app.url);
      const result = app.id === 'BRIDGE' && app.diagnostics?.liveContextFreshness
        ? await runBridgeLiveContextDiagnostics(app, win, app.diagnostics)
        : runAppDiagnostics(app, win);
      results.push(enrichResult({ app, ...result }));
    } catch (error) {
      results.push(enrichResult({ app, level: 'bad', report: error.stack || String(error) }));
    }
    if (options.renderProgress) {
      renderSummary(results);
      renderMaturity(results);
      renderHealer(results);
      renderReports(results);
      setProgress('<strong>' + (index + 1) + '/' + APPS.length + '</strong> 完了: ' + escapeHtml(app.id));
    }
  }
  const summary = suiteSummary(results);
  const signature = signatureFor(results);
  const result = {
    ok: summary.ok,
    level: summary.level,
    status: summary.status,
    signature,
    generatedAt: new Date().toISOString(),
    project: {
      title: WATCHTOWER_CONFIG.projectTitle,
      productName: WATCHTOWER_CONFIG.productName,
      baselineNamespace: WATCHTOWER_CONFIG.baselineNamespace,
    },
    apps: results.map(result => ({
      id: result.app.id,
      title: result.app.title,
      url: result.app.url,
      kind: result.app.kind,
      maturity: result.app.maturity,
      level: result.level,
      issueCode: result.issueCode,
      knownWarning: result.knownWarning,
      reason: result.reason,
      healerHint: result.healerHint,
      report: result.report,
    })),
    healer: {
      safe: true,
      mode: 'manual',
      hints: results.map(result => ({ id: result.app.id, level: result.level, hint: result.healerHint })),
    },
  };
  result.delta = compareWithBaseline(result);
  result.aiBrief = buildAiBrief(result);
  result.agentCard = buildAgentCard(result);
  result.workbench = buildWorkbench(result);
  result.safetyMap = buildSafetyMap(result);
  result.editBudget = buildEditBudget(result);
  result.forbiddenSurfaceMap = buildForbiddenSurfaceMap(result);
  result.cleanupCandidates = buildCleanupCandidates(result);
  result.operationalInsights = buildOperationalInsights(result);
  result.actionPacket = buildActionPacket(result);
  result.sessionLog = readSessionLogSummary(3);
  result.handoffPacket = buildHandoffPacket(result);
  result.architectureScore = buildArchitectureScore(result);
  result.briefExports = buildBriefExports(result);
  result.bugLedger = autoRegisterBugs(result);
  result.focusPacket = buildFocusPacket(result);
  result.changeImpact = assessChange(result.workbench?.focus?.issueCode || result.aiBrief?.headline || '', result);
  result.dangerWarning = buildDangerWarning(result.workbench?.focus?.issueCode || result.aiBrief?.headline || '', result);
  result.checkpoint = saveCheckpoint(result);
  return result;
}

async function runHarness() {
  if (isRunning) return readRenderedResult();
  setControlsRunning(true);
  setStatus('診断中', 'ok');
  setProgress('<strong>0/' + APPS.length + '</strong> 診断を開始しています...');
  summaryEl.innerHTML = '';
  maturityEl.innerHTML = '';
  healerEl.innerHTML = '<strong>HEALER HINT</strong><span>Gathering diagnostics...</span>';
  output.innerHTML = '';
  const suggestionsDiv = document.getElementById('suggestions');
  if (suggestionsDiv) suggestionsDiv.style.display = 'none';
  const result = await runSuite({ renderProgress: true });
  const renderedResults = result.apps.map(app => ({
    app: { id: app.id, title: app.title, url: app.url, kind: app.kind, maturity: app.maturity },
    level: app.level,
    issueCode: app.issueCode,
    knownWarning: app.knownWarning,
    reason: app.reason,
    healerHint: app.healerHint,
    report: app.report,
  }));
  setStatus(result.status, result.level);
  renderSummary(renderedResults);
  renderMaturity(renderedResults);
  renderHealer(renderedResults);
  renderReports(renderedResults);
  renderOperationalInsights(result);
  renderMachineSummary(result);
  renderApproval(result.level, result.signature);
  renderResume(result);
  renderCheckpoint(result);
  renderOwnerPanel(result);
  setProgress('<strong>完了</strong> ' + result.status + ' / focus: ' + escapeHtml(result.workbench?.focus?.id || 'none'));
  setControlsRunning(false);
  return result;
}

async function saveCurrentBaseline() {
  if (isRunning) return false;
  setStatus('基準を保存中', 'ok');
  const result = await runHarness();
  setControlsRunning(true);
  const saved = writeBaseline(result);
  result.delta = compareWithBaseline(result);
  result.aiBrief = buildAiBrief(result);
  result.agentCard = buildAgentCard(result);
  result.workbench = buildWorkbench(result);
  result.safetyMap = buildSafetyMap(result);
  result.editBudget = buildEditBudget(result);
  result.forbiddenSurfaceMap = buildForbiddenSurfaceMap(result);
  result.cleanupCandidates = buildCleanupCandidates(result);
  result.operationalInsights = buildOperationalInsights(result);
  result.actionPacket = buildActionPacket(result);
  result.sessionLog = readSessionLogSummary(3);
  result.handoffPacket = buildHandoffPacket(result);
  result.architectureScore = buildArchitectureScore(result);
  result.briefExports = buildBriefExports(result);
  result.bugLedger = autoRegisterBugs(result);
  result.focusPacket = buildFocusPacket(result);
  result.changeImpact = assessChange(result.workbench?.focus?.issueCode || result.aiBrief?.headline || '', result);
  result.dangerWarning = buildDangerWarning(result.workbench?.focus?.issueCode || result.aiBrief?.headline || '', result);
  renderMachineSummary(result);
  healerEl.innerHTML = '<strong>HEALER HINT</strong><span>' + (saved
    ? 'Baseline saved. Future WT runs can identify regressions and improvements.'
    : 'Baseline save failed. Check browser storage permissions.') + '</span>';
  setStatus(saved ? '基準を保存しました' : '基準保存に失敗', saved ? 'ok' : 'bad');
  setControlsRunning(false);
  return saved;
}

function runHarnessSyncFallback() {
  return runHarness().catch(error => {
    setStatus('FAILED: ' + error.message, 'bad');
    setProgress('<strong>失敗</strong> ' + escapeHtml(error.message || String(error)));
    setControlsRunning(false);
    output.innerHTML = '<section class="report-card bad"><h2>WATCHTOWER FAILED</h2><pre>' + escapeHtml(error.stack || String(error)) + '</pre></section>';
  });
}

document.getElementById('run').addEventListener('click', runHarnessSyncFallback);
document.getElementById('approve').addEventListener('click', () => {
  if (isRunning) return;
  const jsonRaw = jsonEl?.textContent;
  let signature = null;
  let level = null;
  try {
    const parsed = JSON.parse(jsonRaw);
    signature = parsed?.signature || null;
    level = parsed?.level || null;
  } catch (_) {}
  if (!signature || (level !== 'ok' && level !== 'warn')) return;
  const stamp = stampApproval(signature);
  if (stamp) {
    renderApproval(level, signature);
    healerEl.innerHTML = '<strong>HEALER HINT</strong><span>承認済み。AIはこの承認日時を引き継ぎ情報として参照できます。</span>';
    setStatus('承認済み', 'ok');

});

// AI action suggestions feed machineReadable.suggestedActions.
// Keep this function stable unless getMachineReadableResult is updated with it.
function suggestNextActions(result) {
  if (!result) return [];
  // Prefer focusPacket if available
  const focus = (typeof buildFocusPacket === 'function') ? buildFocusPacket(result) : (result.focusPacket || {});
  const aiBrief = result.aiBrief || {};
  const actions = [];

  // Primary: doNow (explicit urgent tasks)
  if (focus && Array.isArray(focus.doNow) && focus.doNow.length) {
    for (const id of focus.doNow) {
      const app = result.apps.find(a => a.id === id) || {};
      actions.push({
        id,
        title: app.title || id,
        action: 'Repair / Investigate',
        priority: 'high',
        steps: [
          'Open ' + (app.url || 'related files'),
          'Inspect diagnostics report and console',
          'Apply smallest fix to remove blocker',
          'Rerun Watchtower and verify change'
        ],
        reason: app.reason || aiBrief.headline || 'focus packet recommendation',
        confidence: 0.9,
        requiredChecks: [
          'window.WATCHTOWER.run()',
          'Verify focus app diagnostics',
        ],
      });
    }
    return actions;
  }

  // Secondary: reviewOrder from aiBrief
  if (aiBrief && Array.isArray(aiBrief.reviewOrder) && aiBrief.reviewOrder.length) {
    for (const id of aiBrief.reviewOrder.slice(0, 3)) {
      const app = result.apps.find(a => a.id === id) || {};
      actions.push({
        id,
        title: app.title || id,
        action: 'Triage / Investigate',
        priority: 'medium',
        steps: [
          'Open ' + (app.url || 'related files'),
          'Read report and healer hint',
          'Run targeted diagnostics if available',
          'Prepare minimal PR with tests if possible'
        ],
        reason: app.reason || aiBrief.headline || 'ai review order',
        confidence: 0.75,
        requiredChecks: [
          'window.WATCHTOWER.run()',
          'Review app report and healer hint',
        ],
      });
    }
    return actions;
  }

  // Fallback: suggest inspecting any bad/warn app
  const candidates = (result.apps || []).filter(a => a.level === 'bad' || a.level === 'warn');
  for (const app of candidates.slice(0, 3)) {
    actions.push({
      id: app.id,
      title: app.title,
      action: app.level === 'bad' ? 'Fix blocker' : 'Investigate warning',
      priority: app.level === 'bad' ? 'high' : 'medium',
      steps: [
        'Open ' + (app.url || 'related files'),
        'Check diagnostics and logs',
        'Make minimal change and rerun Watchtower'
      ],
      reason: app.reason || '',
      confidence: app.level === 'bad' ? 0.9 : 0.6,
      requiredChecks: [
        'window.WATCHTOWER.run()',
        'Confirm current issue in the report',
      ],
    });
  }
  return actions;
}

function formatHandoffForAgent(agentName, result, opts = {}) {
  if (!result) {
    return 'No Watchtower result available. Run window.WATCHTOWER.run() first.';
  }
  const name = String(agentName || 'gpt').trim().toLowerCase();
  const profileGuide = getAiProfileGuide(name, result);
  const concise = opts.concise === true;
  const maxSteps = typeof opts.maxSteps === 'number' ? opts.maxSteps : 4;
  const focus = result.workbench?.focus || null;
  const status = result.status || 'unknown';
  const verdict = result.aiBrief?.verdict || 'unknown';
  const nextAction = result.aiBrief?.nextAction || 'Run Watchtower and inspect the focus app.';
  const actionPacket = result.actionPacket || buildActionPacket(result);
  const reviewOrder = Array.isArray(result.aiBrief?.reviewOrder) ? result.aiBrief.reviewOrder.join(' → ') : 'none';
  const baseline = result.delta?.available ? result.delta.status : 'missing';
  const approval = result.handoffPacket?.approval ? 'approved' : 'unapproved';
  const requiredChecks = focus?.id ? [
    'window.WATCHTOWER.run()',
    'Inspect focus app: ' + focus.id,
    'Follow Watchtower suggestions before editing',
  ] : ['window.WATCHTOWER.run()', 'Inspect Watchtower summary and reports'];
  const agentLabel = profileGuide.label || (name === 'claude' ? 'Claude' : name === 'codex' ? 'Codex' : 'GPT');
  const lines = [];
  lines.push(agentLabel + ' HANDOFF');
  lines.push('Profile: ' + profileGuide.profile + ' | bias: ' + profileGuide.outputBias);
  lines.push('Project: ' + (result.project?.title || 'unknown'));
  lines.push('Status: ' + status + ' | verdict: ' + verdict + ' | baseline: ' + baseline + ' | approval: ' + approval);
  lines.push('Review order: ' + reviewOrder);
  lines.push('Next action: ' + nextAction);
  lines.push('Action packet: ' + (actionPacket?.mission || 'inspect-watchtower') + (actionPacket?.targetApp ? ' @' + actionPacket.targetApp : ''));
  lines.push('Focus: ' + (focus ? focus.id + ' - ' + (focus.title || '') : 'none'));
  if (focus && focus.issueCode) {
    lines.push('Issue code: ' + focus.issueCode);
  }
  lines.push('');
  lines.push('Primary task:');
  if (focus) {
    lines.push('- ' + focus.id + ': ' + (focus.reason || focus.healerHint || 'Inspect this app.'));
  } else {
    lines.push('- No explicit focus. Start with the first app in reviewOrder.');
  }
  lines.push('');
  lines.push('Suggested steps:');
  if (focus) {
    const stepList = [
      'Open ' + (focus.url || 'the related app or file'),
      'Review diagnostics, report, and healer hint',
      'Fix the issue with the smallest safe change',
      'Rerun window.WATCHTOWER.runAndRender() and verify the new result',
    ].slice(0, maxSteps);
    stepList.forEach((step, index) => lines.push((index + 1) + '. ' + step));
  } else {
    const stepList = [
      'Run window.WATCHTOWER.runAndRender()',
      'Review the summary and report cards',
      'Identify the top app in reviewOrder to fix',
      'Rerun Watchtower after changes',
    ].slice(0, maxSteps);
    stepList.forEach((step, index) => lines.push((index + 1) + '. ' + step));
  }
  lines.push('');
  lines.push('Required checks:');
  lines.push(...requiredChecks.map(check => '- ' + check));
  lines.push('Profile preferences: ' + profileGuide.prefers.join(', '));
  if (concise) {
    return lines.slice(0, 12).join('\n');
  }
  lines.push('');
  lines.push('Before edit for this profile:');
  profileGuide.beforeEdit.forEach(item => lines.push('- ' + item));
  lines.push('');
  lines.push('After edit for this profile:');
  profileGuide.afterEdit.forEach(item => lines.push('- ' + item));
  if (result.handoffPacket?.markdown) {
    lines.push('');
    lines.push('Watchtower handoff summary:');
    lines.push(result.handoffPacket.markdown.split('\n').slice(0, 10).join('\n'));
  }
  return lines.join('\n');
}

function assessIntentAndGuard(intent, result = null) {
  const assessment = typeof assessChange === 'function' ? assessChange(intent, result) : { intent: String(intent || ''), risk: 'UNKNOWN', impactedApps: [] };
  const danger = typeof buildDangerWarning === 'function' ? buildDangerWarning(assessment.intent || intent, result) : null;
  const impactedApps = danger?.impactedApps || assessment.impactedApps || [];
  const requiredChecks = danger?.requiredChecks || assessment.requiredChecks || [];
  const warning = danger?.message || assessment.warning || '';
  const risk = danger?.risk || assessment.risk || 'UNKNOWN';
  const safe = (risk !== 'HIGH') && (danger ? !!danger.safe : true);
  return {
    contractVersion: 1,
    intent: String(intent || ''),
    risk,
    confidence: assessment.confidence || (impactedApps.length ? 'matched-safety-map' : 'no-direct-match'),
    impactedApps,
    requiredChecks,
    warning,
    safe,
  };
}

function isIntentSafe(intent, result = null) {
  try {
    const res = assessIntentAndGuard(intent, result);
    return !!res.safe;
  } catch (_) { return false; }
}
