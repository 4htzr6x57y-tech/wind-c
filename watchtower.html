<!--
================================================================
PORTABLE GUIDE — watchtower.html 単体移植メモ
================================================================

このファイル1つで完結します。他のファイルは不要です。

## AI ENTRYPOINT — 初見AIはここから

1. このファイルがあるプロジェクトでは、編集前に watchtower.html を確認する
2. ブラウザで開き window.WATCHTOWER.run() を実行する
3. window.WATCHTOWER.checkRequest("依頼内容", result) を実行する
4. result.editBudget と result.forbiddenSurfaceMap を読む
5. 人間用ボタン契約（診断する / 診断結果を承認 / AIに続きを頼む / 今の状態を基準にする）は、ユーザーが明示した時だけ変更する
6. 小さいサマリーカードの見た目は HUMAN_SUMMARY_CARD_CONTRACT として固定。ユーザーが明示した時だけ変更する
7. 編集後は window.WATCHTOWER.runAndRender() で再診断する
8. 作業後は window.WATCHTOWER.recordSessionLog({ intent, outcome, detail, signatureBefore, signatureAfter, filesChanged }) を呼ぶ

## 移植手順

1. watchtower.html をコピーして新プロジェクトに置く
2. WATCHTOWER_CONFIG だけを編集する:
   - projectTitle     : プロジェクト名
   - baselineNamespace: localStorage のキープレフィックス（重複しない文字列）
   - loadTimeout      : アプリ読み込み待機時間（ms、デフォルト 8000）
   - expectedIds      : 監視するアプリIDの一覧
   - knownWarnings    : 既知の警告（無視してよいもの）
   - apps             : 監視対象アプリの定義

3. 各アプリに diagnostics.protocol を設定する:
   - 'standard' : AppDiagnostics を持つアプリ
   - 'harness'  : カスタムテストハーネスを持つアプリ
   - 'self'     : Watchtower 自身

4. 「診断する」を押して診断が通ったら「今の状態を基準にする」を保存する

## AI向け利用フロー

1. window.WATCHTOWER.run() で診断実行
2. result.aiBrief.verdict を確認
3. result.workbench.focus のアプリを修正
4. 修正後に再度 run() して比較
5. OK になったらオーナーに「診断結果を承認」を依頼

## 安定フィールド（破壊的変更なし）

- result.status / result.signature / result.level
- result.aiBrief.verdict / reviewOrder / nextAction
- result.actionPacket.mission / targetApp / successCondition
- result.workbench.focus / queues / acceptance
- result.handoffPacket.markdown / approval
- result.editBudget.level / maxFiles / maxRisk
- result.forbiddenSurfaceMap.surfaces[]
- result.safetyMap.apps[].safe / medium / danger
- result.bugLedger.open / dangerZones
- result.focusPacket.doNow / skip / text
- result.dangerWarning.message / risk / safe
- result.briefExports.sessionBrief.text
- result.briefExports.conversationStarter.claude
- result.handoffPacket.sessionLog / result.machineReadable.sessionLog
- window.WATCHTOWER.generateReadme(result)
- window.WATCHTOWER.assessChange(intent, result)
- window.WATCHTOWER.checkRequest(intent, result)
- window.WATCHTOWER.recordSessionLog(entry)

================================================================
-->

const BASELINE_KEY = WATCHTOWER_CONFIG.baselineNamespace + '.watchtower.baseline.v1';
const APPROVAL_KEY = WATCHTOWER_CONFIG.baselineNamespace + '.watchtower.approval.v1';
const SESSION_LOG_KEY = WATCHTOWER_CONFIG.baselineNamespace + '.watchtower.sessionlog.v1';
const SESSION_LOG_MAX = 50;

function readApproval() {
  try {
    return JSON.parse(localStorage.getItem(APPROVAL_KEY) || 'null');
  } catch (_) {
    return null;
  }
}

function readSessionLog() {
  try {
    const value = JSON.parse(localStorage.getItem(SESSION_LOG_KEY) || '[]');
    return Array.isArray(value) ? value : [];
  } catch (_) {
    return [];
  }
}

function normalizeSessionOutcome(outcome) {
  const value = String(outcome || 'note').toLowerCase();
  return ['success', 'failed', 'blocked', 'note'].includes(value) ? value : 'note';
}

function recordSessionLog(entry = {}) {
  const previous = readSessionLog();
  const item = {
    id: 'log-' + Date.now() + '-' + Math.random().toString(36).slice(2, 8),
    recordedAt: new Date().toISOString(),
    intent: String(entry.intent || 'unspecified work'),
    outcome: normalizeSessionOutcome(entry.outcome),
    detail: String(entry.detail || ''),
    signatureBefore: entry.signatureBefore || null,
    signatureAfter: entry.signatureAfter || null,
    filesChanged: Array.isArray(entry.filesChanged) ? entry.filesChanged.map(String) : [],
    verdict: entry.verdict || null,
  };
  const next = [item, ...previous].slice(0, SESSION_LOG_MAX);
  try {
    localStorage.setItem(SESSION_LOG_KEY, JSON.stringify(next));
  } catch (_) {}
  return item;
}

function readSessionLogSummary(limit = 3) {
  const entries = readSessionLog();
  const recent = entries.slice(0, Math.max(1, limit || 3));
  const successCount = entries.filter(entry => entry.outcome === 'success').length;
  const failedCount = entries.filter(entry => entry.outcome === 'failed' || entry.outcome === 'blocked').length;
  return {
    contractVersion: 1,
    available: entries.length > 0,
    total: entries.length,
    successCount,
    failedCount,
    maxEntries: SESSION_LOG_MAX,
    entries: recent,
    latest: recent[0] || null,
    summary: entries.length
      ? recent.map(formatSessionLogEntry).join('\n')
      : '作業日誌はまだありません。',
  };
}

function resetSessionLog() {
  try {
    localStorage.removeItem(SESSION_LOG_KEY);
    return true;
  } catch (_) {
    return false;
  }
}

function formatSessionLogEntry(entry) {
  const ts = entry.recordedAt
    ? new Date(entry.recordedAt).toLocaleString('ja-JP', { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' })
    : '日時不明';
  const sig = entry.signatureAfter ? ' → ' + String(entry.signatureAfter).split('|')[0] : '';
  return ts + ' / ' + entry.outcome + ' / ' + entry.intent + sig;
}

function writeApproval(stamp) {
  try {
    localStorage.setItem(APPROVAL_KEY, JSON.stringify(stamp));
    return true;
  } catch (_) {
    return false;
  }
}

function stampApproval(signature) {
  const stamp = {
    approvedAt: new Date().toISOString(),
    signature,
  };
  return writeApproval(stamp) ? stamp : null;
}

function autoRegisterBugs(result) {
  // 診断結果からバグを自動登録する。
  // bad / warn(known以外) のアプリを対象に、同じissueCodeが未登録なら追加。
  const ledger = readBugLedger();
  const newEntries = [];
  for (const app of result.apps) {
    if (app.level === 'ok') continue;
    if (app.knownWarning) continue;
    const alreadyLogged = ledger.some(entry =>
      entry.appId === app.id && entry.issueCode === app.issueCode
    );
    if (alreadyLogged) continue;
    const config = APPS.find(item => item.id === app.id);
    const dangerZone = config?.safety?.danger?.[0] || app.id + ' unknown zone';
    newEntries.push({
      id: 'bug-' + Date.now() + '-' + app.id,
      detectedAt: result.generatedAt,
      appId: app.id,
      appTitle: app.title,
      issueCode: app.issueCode,
      level: app.level,
      reason: app.reason,
      dangerZone,
      signature: result.signature,
      resolved: false,
    });
  }
  // resolved済みを更新（今回OKになったものをresolvedにする）
  const updated = ledger.map(entry => {
    if (entry.resolved) return entry;
    const currentApp = result.apps.find(app => app.id === entry.appId);
    if (currentApp && currentApp.level === 'ok') {
      return { ...entry, resolved: true, resolvedAt: result.generatedAt };
    }
    return entry;
  });
  const merged = [...updated, ...newEntries];
  writeBugLedger(merged);
  return { added: newEntries.length, total: merged.length, entries: merged };
}

function buildBugLedgerSummary(result) {
  const ledger = readBugLedger();
  const open = ledger.filter(entry => !entry.resolved);
  const resolved = ledger.filter(entry => entry.resolved);
  const focusId = result?.workbench?.focus?.id;
  const prioritized = open.slice().sort((a, b) => {
    if (a.appId === focusId && b.appId !== focusId) return -1;
    if (b.appId === focusId && a.appId !== focusId) return 1;
    const lvl = { bad: 2, warn: 1 };
    return (lvl[b.level] || 0) - (lvl[a.level] || 0);
  });
  // 「いつから壊れたか」: checkpointHistoryと照合して初出世代を付与
  const history = readCheckpointHistory();
  const withAge = prioritized.map(entry => {
    const firstSeen = history.reduce((earliest, cp) => {
      const found = (cp.apps || []).find(app =>
        app.id === entry.appId && app.level !== 'ok' && app.issueCode === entry.issueCode
      );
      if (found && (!earliest || cp.savedAt < earliest)) return cp.savedAt;
      return earliest;
    }, null);
    const ageMs = firstSeen ? Date.now() - new Date(firstSeen).getTime() : null;
    const ageDays = ageMs !== null ? Math.floor(ageMs / 86400000) : null;
    return {
      ...entry,
      firstSeenAt: firstSeen || entry.detectedAt,
      ageDays,
      ageLabel: ageDays === null ? '初回検出' : ageDays === 0 ? '今日から' : ageDays + '日前から',
    };
  });
  return {
    contractVersion: 1,
    open: withAge,
    resolved: resolved.slice(-10),
    openCount: open.length,
    resolvedCount: resolved.length,
    dangerZones: [...new Set(open.map(entry => entry.dangerZone))],
    warning: open.length
      ? open.length + '件の未解決バグ。dangerZonesを触る前に確認してください。'
      : '未解決バグなし。',
  };
}

function readCheckpointHistory() {

function saveCheckpoint(result) {
  try {
    const history = readCheckpointHistory();
    const entry = {
      savedAt: result.generatedAt,
      signature: result.signature,
      status: result.status,
      level: result.level,
      verdict: result.aiBrief?.verdict || 'unknown',
      focus: result.workbench?.focus?.id || null,
      apps: result.apps.map(app => ({
        id: app.id,
        level: app.level,
        issueCode: app.issueCode,
      })),
    };
    const updated = [entry, ...history].slice(0, CHECKPOINT_MAX);
    localStorage.setItem(CHECKPOINT_KEY, JSON.stringify(updated));
    return { saved: true, total: updated.length };
  } catch (_) {
    return { saved: false, total: 0 };
  }
}

  checkpointText.textContent = ts + ' / ' + latest.status +

function renderOwnerPanel(result) {
  if (!result) { ownerPanel.classList.remove('visible'); return; }

  const bugSummary = buildBugLedgerSummary(result);
  const openBugs = bugSummary.openCount;

  // 行1: 全体の状態
  const statusEmoji = result.level === 'ok' ? '🟢' : result.level === 'warn' ? '🟡' : '🔴';
  const statusJa = result.level === 'ok'
    ? '全アプリ正常です'
    : result.level === 'warn'
      ? '軽微な問題があります（動作には影響なし）'
      : '問題があります（要確認）';
  const statusEn = result.level === 'ok'
    ? 'All apps healthy'
    : result.level === 'warn'
      ? 'Minor issue (non-blocking)'
      : 'Problem detected';

  // 行2: バグ状況
  const bugEmoji = openBugs === 0 ? '✅' : openBugs <= 2 ? '🟡' : '🔴';
  const bugJa = openBugs === 0
    ? '未解決バグ: なし'
    : '未解決バグ: ' + openBugs + '件（' +
      bugSummary.open.slice(0, 2).map(b => b.appId + ' / ' + b.ageLabel).join('、') +
      (openBugs > 2 ? '…' : '') + '）';
  const bugEn = openBugs === 0
    ? 'No open bugs'
    : openBugs + ' open bug' + (openBugs > 1 ? 's' : '');

  // 行3: AIの次の作業
  const nextJa = result.aiBrief?.nextAction || 'Watchtowerを再実行してください';
  const actionEmoji = result.ok ? '📋' : '🔧';

  function row(emoji, ja, en) {
    return emoji + ' <span class="ja">' + escapeHtml(ja) + '</span>' +
      '<span class="en">/ ' + escapeHtml(en) + '</span>';
  }

  ownerRow1.innerHTML = row(statusEmoji, statusJa, statusEn);
  ownerRow2.innerHTML = row(bugEmoji, bugJa, bugEn);
  ownerRow3.innerHTML = row(actionEmoji, 'AIの次の作業: ' + nextJa, '');
  ownerPanel.classList.add('visible');
}

    approvalLine,

    '【今回やること】',
    fp?.doNow?.length ? fp.doNow.join(', ') : 'なし（全部OK）',

    '【今回触らない】',
    fp?.skip?.length ? fp.skip.join(', ') : 'なし',
    '',
    '【未解決バグ】',
    bugSummary.openCount
      ? bugLines.join('\n') + (bugSummary.openCount > 3 ? '\n  ...他' + (bugSummary.openCount - 3) + '件' : '')
      : 'なし',
    '',
    '【作業日誌 (直近3件)】',

    '',
    '【次のアクション】',
    result.aiBrief.nextAction,

    '',
    'signature: ' + result.signature,
    '生成: ' + new Date(result.generatedAt).toLocaleString('ja-JP'),

function copyResumeText(result) {
  const text = buildResumeText(result);
  if (navigator.clipboard?.writeText) {
    navigator.clipboard.writeText(text).then(() => {
      resumeBtn.textContent = 'コピー済み ✓';
      resumeBtn.className = 'ready copied';
      setTimeout(() => {
        resumeBtn.textContent = resumeBtn.dataset.defaultLabel || 'AIに続きを頼む';
        resumeBtn.className = 'ready';
      }, 2500);
    }).catch(() => fallbackCopy(text));
  } else {
    fallbackCopy(text);
  }
}

function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  resumeBtn.textContent = 'コピー済み ✓';
  resumeBtn.className = 'ready copied';
  setTimeout(() => {
    resumeBtn.textContent = resumeBtn.dataset.defaultLabel || 'AIに続きを頼む';
    resumeBtn.className = 'ready';
  }, 2500);
}

function checkSummaryCardContract() {
  const failures = [];
  const warnings = [];
  if (!summaryEl) {
    failures.push('summary card contract missing: summary container');
  } else {
    const tile = summaryEl.querySelector('.tile');
    if (!tile) {
      warnings.push('summary card contract: tile not yet rendered');
    } else if (window.innerWidth >= 900) {
      const tileStyle = getComputedStyle(tile);
      const tileWidth = Math.round(tile.getBoundingClientRect().width);
      const minHeight = parseInt(tileStyle.minHeight, 10);
      const titleFontSize = parseInt(getComputedStyle(tile.querySelector('strong')).fontSize, 10);
      const labelFontSize = parseInt(getComputedStyle(tile.querySelector('span')).fontSize, 10);
      const reasonFontSize = parseInt(getComputedStyle(tile.querySelector('small')).fontSize, 10);
      if (tileWidth !== HUMAN_SUMMARY_CARD_CONTRACT.desktopWidthPx) failures.push('summary card width changed: ' + tileWidth);
      if (minHeight !== HUMAN_SUMMARY_CARD_CONTRACT.minHeightPx) failures.push('summary card min-height changed: ' + minHeight);
      if (titleFontSize !== HUMAN_SUMMARY_CARD_CONTRACT.titleFontSizePx) failures.push('summary card title font changed: ' + titleFontSize);
      if (labelFontSize !== HUMAN_SUMMARY_CARD_CONTRACT.labelFontSizePx) failures.push('summary card label font changed: ' + labelFontSize);
      if (reasonFontSize !== HUMAN_SUMMARY_CARD_CONTRACT.reasonFontSizePx) failures.push('summary card reason font changed: ' + reasonFontSize);
    }
  }
  lastSummaryCardContractCheck = {
    checked:true,
    ok: failures.length === 0,
    warnings,
    failures,
    checkedAt: new Date().toISOString(),
  };
  return lastSummaryCardContractCheck;
}

function waitForFrame(url) {
  return new Promise((resolve, reject) => {
    const ms = WATCHTOWER_CONFIG.loadTimeout || 8000;
    const timeout = window.setTimeout(() => {
      target.removeEventListener('load', onLoad);
      reject(new Error('timeout loading ' + url + ' (limit: ' + ms + 'ms)'));
    }, ms);
    function onLoad() {
      window.clearTimeout(timeout);
      target.removeEventListener('load', onLoad);
      resolve(target.contentWindow);
    }
    target.addEventListener('load', onLoad);
    target.src = url;
  });
}

function runBasic(app, win) {
  const doc = win.document;
  const hasTitle = doc.title && doc.title.toUpperCase().includes(app.id.replace('-D', ''));
  const hasBody = !!doc.body && doc.body.textContent.trim().length > 0;
  return {
    level: hasTitle && hasBody ? 'ok' : 'bad',
    report: [
      app.id + ' basic check: ' + (hasTitle && hasBody ? 'OK' : 'FAILED'),
      'title: ' + doc.title,
      'bodyText: ' + (hasBody ? 'present' : 'missing'),
    ].join('\n'),
  };
}

function normalizeDiagnosticResult(app, value) {
  if (!value) return { level: 'bad', report: app.id + ' diagnostics unavailable' };
  if (typeof value === 'string') {
    const hasBadStatus = /FAILED|Status:\s*(NG|WARN)|\bWARN\b|警告/i.test(value);
    const failureCount = value.match(/Failures:\s*(\d+)/i);
    const hasFailures = failureCount ? Number(failureCount[1]) > 0 : /\bfailure\b/i.test(value);
    return { level: (hasBadStatus || hasFailures) ? 'warn' : 'ok', report: value };
  }
  if (typeof value.ok === 'boolean') {
    return { level: value.ok ? 'ok' : 'warn', report: value.report || JSON.stringify(value, null, 2) };
  }
  return { level: 'ok', report: JSON.stringify(value, null, 2) };
}

function runHarnessDiagnostics(app, win, diagnostics) {
  const api = win[diagnostics.global];
  const method = diagnostics.method || 'run';
  const result = api?.[method]?.();
  if (!result) return { level: 'bad', report: app.id + ' harness unavailable: ' + diagnostics.global + '.' + method };
  if (diagnostics.format === 'cc') {
    return {
      level: result.ok ? 'ok' : 'bad',
      report: result.report
        + '\n\nspecs:\n' + JSON.stringify(result.specs?.results || [], null, 2)
        + '\n\nsiege:\n' + JSON.stringify(result.siege?.results || [], null, 2),
    };
  }
  return normalizeDiagnosticResult(app, result.report || result);
}

function runStandardDiagnostics(app, win, diagnostics = {}) {
  const defaults = WATCHTOWER_CONFIG.diagnosticDefaults;
  const globals = diagnostics.globals || defaults.standardGlobals;
  const methods = diagnostics.methods || defaults.standardMethods;
  const preset = diagnostics.preset || defaults.presets[app.kind] || 'quick';
  for (const globalName of globals) {
    const api = win[globalName];
    if (!api) continue;
    for (const method of methods) {
      if (typeof api[method] !== 'function') continue;
      const result = api[method]({ preset, log: false });
      const report = api.report && result ? api.report(result) : result;
      return normalizeDiagnosticResult(app, report || result);
    }
  }
  return null;
}

function assessBridgeLiveContext(displayedContext, canonicalContext) {
  const failures = [];
  const displayed = displayedContext || null;
  const canonical = canonicalContext || null;
  function requireMatch(field, expected, seen) {
    if (String(expected || '') !== String(seen || '')) {
      failures.push(field + ' mismatch: expected ' + String(expected || 'missing') + ', seen ' + String(seen || 'missing'));
    }
  }
  if (!displayed) failures.push('displayed bridge context missing');
  if (!canonical) failures.push('canonical bridge context missing');
  if (!displayed || !canonical) {
    return { ok: false, failures, report: 'BRIDGE live context freshness: FAILED\n' + failures.map(item => '- ' + item).join('\n') };
  }
  requireMatch('bridge_version', canonical.bridge_version, displayed.bridge_version);
  if (!displayed.canonical_current_state) failures.push('displayed canonical_current_state missing');
  if (!canonical.canonical_current_state) failures.push('canonical canonical_current_state missing');
  const expectedPointer = canonical.canonical_current_state || {};
  const shownPointer = displayed.canonical_current_state || {};
  const canonicalPackets = Array.isArray(canonical.semantic_packets) ? canonical.semantic_packets : [];
  const canonicalLatestPacketId = canonicalPackets.length
    ? String(canonicalPackets[canonicalPackets.length - 1].packet_id || '') : '';
  requireMatch('canonical_current_state.updated_at', expectedPointer.updated_at, shownPointer.updated_at);
  requireMatch('canonical_current_state.latest_semantic_packet_id', expectedPointer.latest_semantic_packet_id, shownPointer.latest_semantic_packet_id);
  requireMatch('canonical_current_state.watchtower_gate_current_status', expectedPointer.watchtower_gate_current_status, shownPointer.watchtower_gate_current_status);
  requireMatch('canonical_current_state.watchtower_gate_last_checked_at', expectedPointer.watchtower_gate_last_checked_at, shownPointer.watchtower_gate_last_checked_at);
  if (String(expectedPointer.latest_semantic_packet_id || '') !== canonicalLatestPacketId) {
    failures.push('canonical_current_state.latest_semantic_packet_id is behind semantic_packets: expected '
      + (canonicalLatestPacketId || 'missing') + ', seen ' + String(expectedPointer.latest_semantic_packet_id || 'missing'));
  }
  const expectedCheckpoint = canonical.recovery_checkpoint || null;
  const shownCheckpoint = displayed.recovery_checkpoint || null;
  if (expectedCheckpoint && !shownCheckpoint) {
    failures.push('displayed recovery_checkpoint missing');
  } else if (expectedCheckpoint && shownCheckpoint) {
    requireMatch('recovery_checkpoint.checkpoint_id', expectedCheckpoint.checkpoint_id, shownCheckpoint.checkpoint_id);
    requireMatch('recovery_checkpoint.canonical_pointer_updated_at', shownPointer.updated_at, shownCheckpoint.canonical_pointer_updated_at);
    requireMatch('recovery_checkpoint.bridge_version', shownPointer.bridge_version, shownCheckpoint.bridge_version);
    if (['in_progress', 'blocked'].includes(shownCheckpoint.work_status)
      && !String((shownCheckpoint.pending_actions || [])[0] || '').trim()) {
      failures.push('recovery_checkpoint.pending_actions[0] missing');
    }
  }
  return {
    ok: failures.length === 0,
    failures,
    report: [
      'BRIDGE live context freshness: ' + (failures.length ? 'FAILED' : 'OK'),
      '- displayed_bridge_version: ' + String(displayed.bridge_version || 'missing'),
      '- canonical_bridge_version: ' + String(canonical.bridge_version || 'missing'),
      '- canonical_latest_semantic_packet_id: ' + String(shownPointer.latest_semantic_packet_id || 'missing'),
      '- actual_latest_semantic_packet_id: ' + (canonicalLatestPacketId || 'missing'),
      '- recovery_checkpoint: ' + String((shownCheckpoint || {}).checkpoint_id || 'missing'),
    ].concat(failures.map(item => '- ' + item)).join('\n'),
  };
}

async function runBridgeLiveContextDiagnostics(app, win, diagnostics = {}) {
  const standard = runStandardDiagnostics(app, win, diagnostics) || runBasic(app, win);
  let displayedContext = null;
  let canonicalContext = null;
  const deadline = Date.now() + (WATCHTOWER_CONFIG.loadTimeout || 8000);
  while (!displayedContext && Date.now() < deadline) {
    try {
      const view = win.document.getElementById('jsonView');
      displayedContext = JSON.parse(view && view.value ? view.value : '');
    } catch (error) {
      await new Promise(resolve => window.setTimeout(resolve, 50));
    }
  }
  if (!displayedContext) {
    return { level: 'bad', report: standard.report + '\n\nBRIDGE live context freshness: FAILED\n- displayed context did not become readable before timeout' };
  }
  try {
    const response = await fetch('./bridge-context.json?wt_fresh=' + Date.now(), { cache: 'no-store' });
    if (!response.ok) throw new Error('HTTP ' + response.status);
    canonicalContext = await response.json();
  } catch (error) {
    return { level: 'bad', report: standard.report + '\n\nBRIDGE live context freshness: FAILED\n- unable to fetch canonical context: ' + error.message };
  }
  const live = assessBridgeLiveContext(displayedContext, canonicalContext);
  const core = win.BRIDGE && typeof win.BRIDGE.run_bridge_core_diagnostics === 'function'
    ? win.BRIDGE.run_bridge_core_diagnostics(canonicalContext) : null;
  const coreOk = !core || core.bridge_status === 'healthy';
  const coreReport = core ? [
    'WT Core live context: ' + (coreOk ? 'OK' : 'FAILED'),
    '- bridge_status: ' + core.bridge_status,
    '- canonical: ' + core.canonical,
    '- warnings: ' + ((core.warnings || []).join(' / ') || 'none')
  ].join('\n') : 'WT Core live context: unavailable';
  return {
    level: standard.level === 'ok' && live.ok && coreOk ? 'ok' : 'bad',
    report: standard.report + '\n\n' + live.report + '\n\n' + coreReport,
  };
}

function runAppDiagnostics(app, win) {
  const diagnostics = app.diagnostics || {};
  if (diagnostics.protocol === 'self' || app.kind === 'self') {
    return runWatchtowerSelfDiagnostics();
  }

  if (diagnostics.protocol === 'harness') {
    return runHarnessDiagnostics(app, win, diagnostics);
  }

  if (diagnostics.protocol === 'standard' || diagnostics.protocol === 'auto' || !diagnostics.protocol) {
    const result = runStandardDiagnostics(app, win, diagnostics);
    if (result) return result;
  }

  return runBasic(app, win);
}

function runWatchtowerSelfDiagnostics() {
  const failures = [];
  const warnings = [];
  const src = document.documentElement.innerHTML;

  // ── アプリレジストリ整合性 ──
  const appIds = APPS.map(app => app.id);
  const appUrls = APPS.map(app => app.url);
  const duplicatedIds = appIds.filter((id, index) => appIds.indexOf(id) !== index);
  const duplicatedUrls = appUrls.filter((url, index) => appUrls.indexOf(url) !== index);
  WATCHTOWER_CONFIG.expectedIds.forEach(id => {
    if (!appIds.includes(id)) failures.push('missing app registry entry: ' + id);
  });
  if (duplicatedIds.length) failures.push('duplicate app ids: ' + [...new Set(duplicatedIds)].join(', '));
  if (duplicatedUrls.length) failures.push('duplicate app urls: ' + [...new Set(duplicatedUrls)].join(', '));

  // ── DOM構造 ──
  if (!target || target.tagName !== 'IFRAME') failures.push('iframe loader missing');
  if (!summaryEl || !maturityEl || !output) failures.push('report containers missing');
  if (!document.getElementById('owner-panel')) failures.push('owner panel missing');
  if (!document.getElementById('approval-banner')) failures.push('approval banner missing');
  if (!document.getElementById('checkpoint-banner')) failures.push('checkpoint banner missing');
  if (!document.getElementById('watchtower-json')) failures.push('machine-readable json element missing');
  const humanButtons = Array.from(document.querySelectorAll('.actions > button'));
  const actualHumanButtonIds = humanButtons.map(button => button.id).join('|');
  const expectedHumanButtonIds = HUMAN_BUTTON_CONTRACT.map(button => button.id).join('|');
  if (actualHumanButtonIds !== expectedHumanButtonIds) {
    failures.push('human button contract changed: ' + actualHumanButtonIds + ' expected ' + expectedHumanButtonIds);
  }
  HUMAN_BUTTON_CONTRACT.forEach(spec => {
    const button = document.getElementById(spec.id);
    if (!button) {
      failures.push('human button missing: ' + spec.id);
      return;
    }
    const label = button.dataset.defaultLabel || button.textContent.trim();
    if (label !== spec.label) failures.push('human button label changed: ' + spec.id + '=' + label);
  });
  if (!summaryEl) failures.push('summary card contract missing: summary container');
  const expectedColumns = HUMAN_SUMMARY_CARD_CONTRACT.gridTemplate;
  const sourceHasDesktopGrid = src.includes('grid-template-columns:' + expectedColumns);
  if (!sourceHasDesktopGrid) failures.push('summary card grid contract changed');
  if (lastSummaryCardContractCheck.checked) {
    lastSummaryCardContractCheck.failures.forEach(item => failures.push(item));
  }

  // ── 設定整合性 ──
  if (!WATCHTOWER_CONFIG.loadTimeout) warnings.push('loadTimeout not set in config');
  if (!WATCHTOWER_CONFIG.baselineNamespace) failures.push('baselineNamespace missing');
  const validLevels = ['ok', 'warn', 'bad'];
  if (validLevels.length !== 3) failures.push('result levels invalid');
  if (!APPS.every(app => app.maturity && app.title && app.url)) warnings.push('some registry metadata is incomplete');
  if (!APPS.every(app => app.diagnostics?.protocol)) warnings.push('some apps use implicit diagnostics protocol');

  // ── 公開APIの存在確認 ──
  const requiredApis = [
    'run', 'runAndRender', 'readBaseline', 'saveBaseline',
    'exportBaseline', 'importBaseline', 'readApproval', 'stampApproval',
    'readBugLedger', 'resetBugLedger', 'buildBugLedgerSummary',
    'readSessionLog', 'recordSessionLog', 'readSessionLogSummary', 'resetSessionLog',
    'readCheckpointHistory', 'saveCheckpoint', 'buildResumeText',
    'buildFocusPacket', 'buildDangerWarning', 'compareWithBaseline',
    'buildAiBrief', 'buildActionPacket', 'getActionPacket', 'buildAgentCard', 'buildWorkbench', 'buildHandoffPacket',
    'buildSafetyMap', 'buildEditBudget', 'buildForbiddenSurfaceMap', 'buildArchitectureScore', 'buildBriefExports',
    'buildCleanupCandidates', 'assessBridgeLiveContext',
    'generateReadme', 'assessChange', 'healerHintFor',
    'formatHandoffForAgent', 'getMachineReadableResult', 'getMachineReadableResultAsync',
    'suggestNextActions', 'checkRequest', 'assessIntentAndGuard', 'isIntentSafe',
    'inferHumanRequestedFocus',
    'instrumentAppForTracing', 'analyzeChangeImpact',
    'learnFromHistory', 'getHistoricalRiskProfile',
    'getAiProfileGuide', 'getAgentProfile', 'updateAgentProfile',
  ];
  requiredApis.forEach(name => {
    if (typeof window.WATCHTOWER?.[name] !== 'function') {
      warnings.push('WATCHTOWER.' + name + ' missing from public API');

  // ── コアコントラクトのソース検査 ──

    'renderOwnerPanel', 'assessIntentAndGuard', 'checkRequest', 'HUMAN_BUTTON_CONTRACT', 'HUMAN_SUMMARY_CARD_CONTRACT',
    'humanRequestedFocus',

  requiredTokens.forEach(token => {

  // ── ポータビリティチェック ──

    'WATCHTOWER_CONFIG', 'baselineNamespace', 'expectedIds',

  // ── 残骸とリクエストゲートの契約 ──

  const selfSample = {

  if (!protectedButtonRequest.forbiddenHits.some(hit => hit.id === 'human-button-contract')) {

  const bridgeCurrentSample = {
    bridge_version: '1.2',

    canonical_current_state: {

      updated_at: 'latest',

  const bridgeFreshSample = assessBridgeLiveContext(bridgeCurrentSample, bridgeCurrentSample);

    canonical_current_state: Object.assign({}, bridgeCurrentSample.canonical_current_state, { latest_semantic_packet_id: 'sp-old' }),
    recovery_checkpoint: null

  if (!bridgeFreshSample.ok) failures.push('BRIDGE live context freshness rejected current sample');
  if (bridgeStaleSample.ok || !bridgeStaleSample.failures.some(item => item.includes('latest_semantic_packet_id'))) {

  const bridgeBehindSample = assessBridgeLiveContext(Object.assign({}, bridgeCurrentSample, {

  if (bridgeBehindSample.ok || !bridgeBehindSample.failures.some(item => item.includes('behind semantic_packets'))) {

  const machineSample = getMachineReadableResult(selfSample);

function escapeHtml(value) {
  return String(value)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function summarizeReport(result) {
  if (result.level === 'ok') return result.app.maturity;
  const firstProblem = String(result.report || '')
    .split('\n')
    .find(line => /Failure|FAILED|Status:\s*NG|警告|WARN|missing|unavailable|outside/i.test(line));
  return firstProblem ? firstProblem.replace(/^[-#\s]+/, '').slice(0, 80) : result.app.maturity;
}

function issueCodeFor(result) {
  const report = String(result.report || '');
  if (result.level === 'ok') return 'ok';
  if (result.app.id === 'CD' && /localStorage used outside Storage\/Diagnostics zones/i.test(report)) return 'cd-boundary-localstorage';
  if (/diagnostics unavailable/i.test(report)) return 'diagnostics-unavailable';
  if (/timeout loading/i.test(report)) return 'load-timeout';
  if (/harness unavailable/i.test(report)) return 'harness-unavailable';
  if (/missing/i.test(report)) return 'missing-contract';
  return result.level + '-unclassified';
}

function isKnownWarning(result, issueCode) {
  return result.level === 'warn' && WATCHTOWER_CONFIG.knownWarnings.some(item =>
    item.appId === result.app.id && item.issueCode === issueCode
  );
}

function healerHintFor(result) {
  if (result.level === 'bad') {
    return 'Open ' + result.app.url + ' directly, check console/runtime errors, then rerun WT before editing.';
  }
  if (result.app.id === 'CD' && result.level === 'warn') {
    return 'CD is operational but has a boundary warning. Inspect AppDiagnostics boundary failures before changing behavior.';
  }
  if (result.app.id === 'ECT-D' && result.app.maturity === 'light diagnostics') {
    return 'ECT-D is healthy at light depth. Promote it by adding source guards and data/import checks when ECT-D changes next.';
  }
  if (result.app.id === 'WT') {
    return 'WT self-monitoring is healthy. Keep APPS registry aligned when adding tools. Run self diagnostics to verify the contract.';
  }
  if (result.app.id === 'CC') {
    return 'CC is fortified. Run siege/spec diagnostics before and after any behavior change.';
  }
  if (result.app.id === 'WC') {
    return 'WC has deep diagnostics. Use its own recommended next command from the report when touching WC.';
  }
  return 'No healing needed. Keep edits small and rerun WT.';
}

function enrichResult(result) {
  const reason = summarizeReport(result);
  const healerHint = healerHintFor(result);
  const issueCode = issueCodeFor(result);
  const knownWarning = isKnownWarning(result, issueCode);
  return { ...result, reason, healerHint, issueCode, knownWarning };
}

function renderSummary(results) {
  summaryEl.innerHTML = results.map(result =>
    '<button type="button" class="tile ' + result.level + '" data-target="' + result.app.id + '">' +
    '<strong>' + result.app.id + ' ' + result.level.toUpperCase() + '</strong>' +
    '<span>' + result.app.title + '</span>' +
    '<small>' + escapeHtml(result.reason) + '</small>' +
    '</button>'
  ).join('');
  summaryEl.querySelectorAll('.tile').forEach(tile => {
    tile.addEventListener('click', () => {
      document.getElementById('report-' + tile.dataset.target)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
  });
  checkSummaryCardContract();
}

function renderHealer(results) {
  const target = results.find(result => result.level === 'bad')
    || results.find(result => result.level === 'warn' && !result.knownWarning)
    || results.find(result => result.level === 'warn')
    || results.find(result => result.app.id === 'ECT-D')
    || results[0];
  healerEl.innerHTML = '<strong>HEALER HINT</strong><span>' + escapeHtml(target?.healerHint || 'No healing needed.') + '</span>';
}

function renderMaturity(results) {
  maturityEl.innerHTML = results.map(result =>
    '<span>' + result.app.id + ': ' + result.app.maturity + '</span>'
  ).join('');
}

function renderReports(results) {
  output.innerHTML = results.map(result =>
    '<section class="report-card ' + result.level + '" id="report-' + result.app.id + '">' +
    '<h2>' + result.app.id + ' ' + result.level.toUpperCase() + '</h2>' +
    '<div class="healer"><strong>HEALER HINT</strong><span>' + escapeHtml(result.healerHint) + '</span></div>' +
    '<pre>' + escapeHtml(result.report) + '</pre>' +
    '</section>'
  ).join('');
}

function renderOperationalInsights(result) {
  if (!result?.operationalInsights || !output) return;
  const insights = result.operationalInsights;
  const delta = insights.deltaCard || {};
  const outcome = insights.humanOutcomeCard || {};
  const metrics = insights.appMetrics || [];
  const capability = insights.diagnosticCapabilityMap || [];
  const metricLine = metrics.map(item => item.id + ':' + (item.summary || 'metrics n/a')).join(' / ');
  const capabilityLine = capability.map(item => item.id + ':' + item.badges.join(',')).join(' / ');
  const html =
    '<section class="report-card ok" id="report-wt-operational-insights">' +
    '<h2>WT OPERATIONAL INSIGHTS</h2>' +
    '<pre>' + escapeHtml([
      'impact: ' + (delta.summary || 'No delta summary.'),
      'changedApps: ' + ((delta.changedApps || []).join(', ') || 'none'),
      'newApps: ' + ((delta.newApps || []).join(', ') || 'none'),
      'removedApps: ' + ((delta.removedApps || []).join(', ') || 'none'),
      'humanOutcome: ' + (outcome.summary || 'No recent work log.'),
      'nextHumanCheck: ' + (outcome.nextHumanCheck || 'Inspect target app normally.'),
      'aiFirstSteps: ' + ((insights.aiFirstSteps || []).map(item => item.step + '.' + item.id).join(' -> ') || 'missing'),
      'capabilities: ' + capabilityLine,
      'appMetrics: ' + metricLine,
      'newAppTemplate: result.operationalInsights.appAdditionTemplate',
    ].join('\n')) + '</pre>' +
    '</section>';
  output.insertAdjacentHTML('afterbegin', html);
}

function renderMachineSummary(result) {
  if (jsonEl) {
    // immediate, lightweight output
    const machineReadable = typeof getMachineReadableResult === 'function'
      ? getMachineReadableResult(result)
      : result;
    jsonEl.textContent = JSON.stringify(machineReadable, null, 2);
    // then attempt to enrich with impact analysis (async, non-blocking)
    if (typeof integrateImpactIntoResult === 'function') {
      try {
        integrateImpactIntoResult(result).then(enriched => {
          try { jsonEl.textContent = JSON.stringify(enriched, null, 2); } catch (_) {}
        });
      } catch (_) {}
    }
  }
}

function getMachineReadableResult(result) {
  if (!result || typeof result !== 'object') return result;
  const normalized = { ...result };
  const agent = WATCHTOWER_CONFIG.agent;
  const _rawActions = suggestNextActions(result);
  const suggestedActions = Array.isArray(_rawActions)
    ? _rawActions.map(action => ({
        id: action.id,
        title: action.title,
        action: action.action,
        priority: action.priority ?? 'normal',
        reason: action.reason,
        requiredChecks: action.requiredChecks || [],
        steps: action.steps,
      }))
    : [];
  normalized.machineReadable = {
    agentGuide: {
      contractVersion: agent.contractVersion,
      portableMode: {
        primaryFile: agent.portableMode.primaryFile,
        requiredFiles: [...agent.portableMode.requiredFiles],
        optionalFiles: [...agent.portableMode.optionalFiles],
        rule: agent.portableMode.rule,
      },
      entrypoints: [...agent.entrypoints],
      quickStart: [...agent.quickStart],
      aiFirstSteps: agent.aiFirstSteps.map(item => ({ ...item })),
      profiles: Object.fromEntries(Object.keys(agent.aiProfiles).map(name => [name, getAiProfileGuide(name, result)])),
      stableSurfaces: [
        '#watchtower-json',
        'window.WATCHTOWER.run()',
        'window.WATCHTOWER.runAndRender()',
        'window.WATCHTOWER.checkRequest(intent, result)',
        'window.WATCHTOWER.recordSessionLog(entry)',
        'result.aiBrief',
        'result.workbench',
        'result.editBudget',
        'result.forbiddenSurfaceMap',
        'result.handoffPacket.sessionLog',
        'result.machineReadable.sessionLog',
      ],
    },
    focusPacket: result.focusPacket || (typeof buildFocusPacket === 'function' ? buildFocusPacket(result) : null),
    aiBrief: result.aiBrief || null,
    actionPacket: result.actionPacket || (typeof buildActionPacket === 'function' ? buildActionPacket(result) : null),
    handoffPacket: result.handoffPacket || null,
    sessionLog: result.sessionLog || readSessionLogSummary(3),
    safetyMap: result.safetyMap || null,
    editBudget: result.editBudget || (typeof buildEditBudget === 'function' ? buildEditBudget(result) : null),
    forbiddenSurfaceMap: result.forbiddenSurfaceMap || (typeof buildForbiddenSurfaceMap === 'function' ? buildForbiddenSurfaceMap(result) : null),
    cleanupCandidates: result.cleanupCandidates || (typeof buildCleanupCandidates === 'function' ? buildCleanupCandidates(result) : null),
    operationalInsights: result.operationalInsights || (typeof buildOperationalInsights === 'function' ? buildOperationalInsights(result) : null),
    architectureScore: result.architectureScore || null,
    suggestedActions,
    agentHandoff: {
      gpt: formatHandoffForAgent('gpt', result, { concise: true }),
      claude: formatHandoffForAgent('claude', result, { concise: true }),
      codex: formatHandoffForAgent('codex', result, { concise: true }),
      cursor: formatHandoffForAgent('cursor', result, { concise: true }),
      copilot: formatHandoffForAgent('copilot', result, { concise: true }),
      gemini: formatHandoffForAgent('gemini', result, { concise: true }),
    },
    impactSummary: null,
    historySummary: null,
    agentProfiles: null,
  };
  // inject historical summary and agent profiles if available (non-destructive)
  try {
    if (typeof learnFromHistory === 'function') {
      normalized.machineReadable.historySummary = learnFromHistory();
    }
  } catch (_) { /* ignore */ }
  try {
    if (typeof readAgentProfiles === 'function') {
      normalized.machineReadable.agentProfiles = readAgentProfiles();
    } else if (typeof getAgentProfile === 'function') {
      // fallback: include empty profile keys for known agents
      normalized.machineReadable.agentProfiles = {
        gpt: getAgentProfile('gpt'),
        claude: getAgentProfile('claude'),
        codex: getAgentProfile('codex'),
      };
    }
  } catch (_) { /* ignore */ }
  return normalized;
}

async function getMachineReadableResultAsync(result, opts = {}) {
  if (!result) return result;
  try {
    return await integrateImpactIntoResult(result, opts);
  } catch (_error) {
    return getMachineReadableResult(result);
  }
}

// --- Historical learning (bug ledger / checkpoints) ---
function learnFromHistory() {
  try {
    const ledger = readBugLedger() || [];
    const checkpoints = readCheckpointHistory() || [];
    const byIssue = {};
    for (const e of ledger) {
      const key = e.issueCode || (e.appId + ':' + (e.issueCode || 'unknown'));
      byIssue[key] = byIssue[key] || { key, occurrences: 0, regressions: 0, apps: new Set(), lastSeen: null };
      byIssue[key].occurrences += 1;
      if (e.level === 'bad') byIssue[key].regressions += 1;
      if (e.appId) byIssue[key].apps.add(e.appId);
      const ts = e.detectedAt || e.resolvedAt || null;
      if (ts) {
        const prev = byIssue[key].lastSeen;
        if (!prev || new Date(ts) > new Date(prev)) byIssue[key].lastSeen = ts;
      }
    }
    const profiles = Object.values(byIssue).map(p => ({
      key: p.key,
      occurrences: p.occurrences,
      regressions: p.regressions,
      apps: Array.from(p.apps),
      lastSeen: p.lastSeen,
    }));
    return { contractVersion: 1, generatedAt: new Date().toISOString(), profiles };
  } catch (e) {
    return { contractVersion: 1, generatedAt: new Date().toISOString(), profiles: [] };
  }
}

function getHistoricalRiskProfile(target) {
  const hist = learnFromHistory();
  if (!target) return hist;
  // match by appId or issueCode
  const matches = hist.profiles.filter(p => p.key === target || (p.apps && p.apps.includes(target)) || (p.key && p.key.includes(target)));
  return { contractVersion: 1, target, matches, summary: matches.length ? matches : [] };
}

// --- Agent profile storage & update hooks ---
function _agentProfilesKey() {
  return (WATCHTOWER_CONFIG && WATCHTOWER_CONFIG.baselineNamespace ? WATCHTOWER_CONFIG.baselineNamespace : 'watchtower') + '.agentprofiles.v1';
}

function readAgentProfiles() {
  try {
    const raw = localStorage.getItem(_agentProfilesKey()) || 'null';
    return JSON.parse(raw) || {};
  } catch (_) { return {}; }
}

function getAiProfileGuide(agentName = 'codex', result = null) {
  const key = String(agentName || 'codex').trim().toLowerCase();
  const aliases = {
    gpt: 'codex',
    openai: 'codex',
    anthropic: 'claude',
    google: 'gemini',
    github: 'copilot',
  };
  const profileKey = WATCHTOWER_CONFIG.agent.aiProfiles[key] ? key : (aliases[key] || 'codex');
  const profile = WATCHTOWER_CONFIG.agent.aiProfiles[profileKey] || WATCHTOWER_CONFIG.agent.aiProfiles.codex;
  const focus = result?.workbench?.focus || null;
  return {
    contractVersion: 1,
    profile: profileKey,
    label: profile.label,
    outputBias: profile.outputBias,
    handoffStyle: profile.handoffStyle,
    prefers: [...profile.prefers],
    beforeEdit: [...profile.beforeEdit],
    afterEdit: [...profile.afterEdit],
    currentFocus: focus ? {
      appId: focus.id,
      issueCode: focus.issueCode,
      url: focus.url,
    } : null,
    firstCommand: 'window.WATCHTOWER.run()',
    requestGate: 'window.WATCHTOWER.checkRequest(intent, result)',
    logCommand: 'window.WATCHTOWER.recordSessionLog(entry)',
  };
}

function writeAgentProfiles(obj) {
  try {
    localStorage.setItem(_agentProfilesKey(), JSON.stringify(obj));
    return true;
  } catch (_) { return false; }
}

function getAgentProfile(agentName) {
  const all = readAgentProfiles();
  return all[agentName] || { name: agentName, runs: 0, successRate: null, regressionRate: null, avgTimeMs: null, strengths: [] };
}

function updateAgentProfile(agentName, outcome) {
  try {
    const all = readAgentProfiles();
    const cur = all[agentName] || { name: agentName, runs: 0, successes: 0, regressions: 0, totalTimeMs: 0, strengths: [] };
    cur.runs = (cur.runs || 0) + 1;
    if (outcome && outcome.success) cur.successes = (cur.successes || 0) + 1;
    if (outcome && typeof outcome.regressions === 'number') cur.regressions = (cur.regressions || 0) + outcome.regressions;
    if (outcome && typeof outcome.timeMs === 'number') cur.totalTimeMs = (cur.totalTimeMs || 0) + outcome.timeMs;
    cur.successRate = cur.runs ? ((cur.successes || 0) / cur.runs) : null;
    cur.regressionRate = cur.runs ? ((cur.regressions || 0) / cur.runs) : null;
    cur.avgTimeMs = cur.runs ? Math.round((cur.totalTimeMs || 0) / cur.runs) : null;
    // optionally merge strengths
    if (outcome && outcome.strengths && Array.isArray(outcome.strengths)) {
      cur.strengths = Array.from(new Set([...(cur.strengths || []), ...outcome.strengths]));
    }
    all[agentName] = cur;
    writeAgentProfiles(all);
    return cur;
  } catch (e) { return null; }
}


async function integrateImpactIntoResult(result, opts = {}) {
  if (!result) return result;
  const out = JSON.parse(JSON.stringify(typeof getMachineReadableResult === 'function' ? getMachineReadableResult(result) : result));
  try {
    // choose targets: focus app, then top reviewOrder apps or apps with bad/warn
    const targets = new Set();
    const focusId = result.workbench?.focus?.id;
    if (focusId) targets.add(focusId);
    const review = Array.isArray(result.aiBrief?.reviewOrder) ? result.aiBrief.reviewOrder.slice(0, 3) : [];
    review.forEach(id => targets.add(id));
    (result.apps || []).filter(a => a.level === 'bad' || a.level === 'warn').slice(0,3).forEach(a => targets.add(a.id));

    const impact = {};
    for (const id of Array.from(targets)) {
      try {
        const r = await analyzeChangeImpact(id, null, { waitMs: opts.waitMs || 200 });
        impact[id] = r;
      } catch (e) {
        impact[id] = { ok: false, reason: 'analyze_failed' };
      }
    }
    out.machineReadable = out.machineReadable || {};
    out.machineReadable.impactSummary = impact;
    return out;
  } catch (error) {
    return out;
  }
}

// --- Runtime instrumentation & change-impact analysis (lightweight, same-origin only) ---
function _findAppWindow(app) {
  try {
    if (!app) return null;
    if (app.kind === 'self') return window;
    // try target iframe first
    const iframes = Array.from(document.getElementsByTagName('iframe'));
    for (const f of iframes) {
      try {
        if (!f.src) continue;
        // match by filename or url fragment
        const src = f.getAttribute('src') || f.src || '';
        if (src.includes(app.url.replace('./', '')) || src.endsWith(app.url.replace('./', ''))) {
          return f.contentWindow;
        }
      } catch (_) { continue; }
    }
    return null;
  } catch (_) { return null; }
}

function instrumentAppForTracing(app) {
  const tracer = {
    appId: app?.id || null,
    available: false,
    mutations: [],
    storageOps: [],
    globals: [],
    _observer: null,
    _origStorage: null,
  };
  const win = _findAppWindow(app);
  if (!win) return tracer;
  try {
    const doc = win.document;
    // MutationObserver
    const observer = new (win.MutationObserver || MutationObserver)((records) => {
      for (const r of records) {
        tracer.mutations.push({ type: r.type, target: (r.target && r.target.nodeName) || null, time: Date.now() });
        if (tracer.mutations.length > 200) tracer.mutations.shift();
      }
    });
    if (doc && doc.body) observer.observe(doc.body, { childList: true, subtree: true, attributes: true });
    tracer._observer = observer;

    // Wrap localStorage (same-origin only)
    try {
      const ls = win.localStorage;
      if (ls) {
        const origSet = ls.setItem.bind(ls);
        const origRemove = ls.removeItem.bind(ls);
        ls.setItem = function(k, v) { tracer.storageOps.push({ op: 'set', key: k, val: String(v), time: Date.now() }); return origSet(k, v); };
        ls.removeItem = function(k) { tracer.storageOps.push({ op: 'remove', key: k, time: Date.now() }); return origRemove(k); };
        tracer._origStorage = { setItem: origSet, removeItem: origRemove };
      }
    } catch (_) { /* ignore cross-origin or readonly */ }

    // Globals scan (function names)
    try {
      const names = Object.keys(win).filter(n => typeof win[n] === 'function');
      tracer.globals = names.slice(0, 200);
    } catch (_) { tracer.globals = []; }

    tracer.available = true;
    tracer._win = win;
  } catch (error) {
    // leave tracer unavailable
  }
  tracer.stop = function() {
    try {
      if (tracer._observer && tracer._observer.disconnect) tracer._observer.disconnect();
      if (tracer._origStorage && tracer._win && tracer._win.localStorage) {
        tracer._win.localStorage.setItem = tracer._origStorage.setItem;
        tracer._win.localStorage.removeItem = tracer._origStorage.removeItem;
      }
    } catch (_) {}
  };
  tracer.snapshot = function() {
    return {
      appId: tracer.appId,
      available: tracer.available,
      mutations: tracer.mutations.slice(-50),
      storageOps: tracer.storageOps.slice(-50),
      globals: tracer.globals,
    };
  };
  return tracer;
}

async function analyzeChangeImpact(appId, functionPath = null, opts = {}) {
  const app = APPS.find(a => a.id === appId);
  if (!app) return { ok: false, reason: 'unknown appId' };
  const tracer = instrumentAppForTracing(app);
  if (!tracer.available) return { ok: false, reason: 'tracing_unavailable', appId };
  // capture short live snapshot
  await new Promise(res => setTimeout(res, opts.waitMs || 150));
  const snap = tracer.snapshot();
  tracer.stop();

  // build lightweight dependency candidates from globals
  const dependencyCandidates = (snap.globals || []).filter(n => n && n.length < 60).slice(0, 200);
  const storageKeys = Array.from(new Set((snap.storageOps || []).map(s => s.key).filter(Boolean))).slice(0, 50);
  const renderChain = (snap.mutations || []).slice(-20).map(m => ({ type: m.type, target: m.target, time: m.time }));

  return {
    ok: true,
    appId,
    functionPath: functionPath || null,
    dependencyCandidates,
    storageKeys,
    renderChain,
    snapshotCount: { mutations: snap.mutations.length, storageOps: snap.storageOps.length },
  };
}


function suiteSummary(results) {
  const hasFailure = results.some(result => result.level === 'bad');
  const hasNewWarning = results.some(result => result.level === 'warn' && !result.knownWarning);
  const hasKnownWarning = results.some(result => result.level === 'warn' && result.knownWarning);
  return {
    ok: !hasFailure && !hasNewWarning,
    level: hasFailure ? 'bad' : hasNewWarning ? 'warn' : hasKnownWarning ? 'warn' : 'ok',
    status: hasFailure ? 'FAILED' : hasNewWarning ? 'WARN' : hasKnownWarning ? 'WARN-KNOWN' : 'OK',
  };
}

function signatureFor(results) {
  return results.map(result => {
    const known = result.knownWarning ? ':known' : '';
    return result.app.id + ':' + result.level + ':' + result.issueCode + known;
  }).join('|');
}

function readBaseline() {
  try {
    return JSON.parse(localStorage.getItem(BASELINE_KEY) || 'null');
  } catch (_) {
    return null;
  }
}

function writeBaseline(result) {
  try {
    localStorage.setItem(BASELINE_KEY, JSON.stringify({
      savedAt: new Date().toISOString(),
      signature: result.signature,
      status: result.status,
      level: result.level,
      apps: result.apps.map(app => ({
        id: app.id,
        level: app.level,
        issueCode: app.issueCode,
        knownWarning: app.knownWarning,
        reason: app.reason,
      })),
    }));
    return true;
  } catch (_) {
    return false;
  }
}

function exportBaseline() {
  const baseline = readBaseline();
  if (!baseline) return null;
  const json = JSON.stringify(baseline, null, 2);
  try {
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = WATCHTOWER_CONFIG.baselineNamespace + '.watchtower.baseline.json';
    a.click();
    URL.revokeObjectURL(url);
  } catch (_) {
    // Non-browser environment (e.g. CI): return JSON string for programmatic use
  }
  return json;
}

function importBaseline(jsonOrObject) {
  try {
    const baseline = typeof jsonOrObject === 'string'
      ? JSON.parse(jsonOrObject)
      : jsonOrObject;
    if (!baseline || !baseline.signature || !Array.isArray(baseline.apps)) {
      return { ok: false, reason: 'invalid baseline structure' };
    }
    localStorage.setItem(BASELINE_KEY, JSON.stringify(baseline));
    return { ok: true, savedAt: baseline.savedAt, signature: baseline.signature };
  } catch (error) {
    return { ok: false, reason: error.message };
  }
}

function severity(level) {
  return level === 'bad' ? 3 : level === 'warn' ? 2 : 1;
}

function compareWithBaseline(result, baseline = readBaseline()) {
  if (!baseline) {
    return { available: false, status: 'none', changes: [], summary: 'No baseline saved.' };
  }
  const changes = result.apps.map(app => {
    const before = baseline.apps?.find(item => item.id === app.id);
    if (!before) return { id: app.id, type: 'new-app', before: null, after: app.level, issueCode: app.issueCode };
    if (before.level === app.level && before.issueCode === app.issueCode && !!before.knownWarning === !!app.knownWarning) return null;
    const beforeSeverity = severity(before.level);
    const afterSeverity = severity(app.level);
    const type = afterSeverity > beforeSeverity
      ? 'regression'
      : afterSeverity < beforeSeverity
        ? 'improvement'
        : 'changed';
    return {
      id: app.id,
      type,
      before: before.level,
      after: app.level,
      beforeIssueCode: before.issueCode,
      afterIssueCode: app.issueCode,
      knownWarning: app.knownWarning,
    };
  }).filter(Boolean);
  const removed = (baseline.apps || [])
    .filter(item => !result.apps.some(app => app.id === item.id))
    .map(item => ({ id: item.id, type: 'removed-app', before: item.level, after: null, beforeIssueCode: item.issueCode }));
  const allChanges = changes.concat(removed);
  const hasRegression = allChanges.some(change => change.type === 'regression' || change.type === 'new-app' && change.after !== 'ok');
  const hasImprovement = allChanges.some(change => change.type === 'improvement');
  return {
    available: true,
    status: hasRegression ? 'regression' : hasImprovement ? 'improvement' : allChanges.length ? 'changed' : 'unchanged',
    baselineSignature: baseline.signature,
    currentSignature: result.signature,
    savedAt: baseline.savedAt || null,
    changes: allChanges,
    summary: allChanges.length
      ? allChanges.map(change => change.id + ':' + change.type + '(' + (change.before || '-') + '->' + (change.after || '-') + ')').join(', ')
      : 'No changes from baseline.',
  };
}

function buildAiBrief(result) {
  const blockers = result.apps.filter(app => app.level === 'bad');
  const newWarnings = result.apps.filter(app => app.level === 'warn' && !app.knownWarning);
  const knownWarnings = result.apps.filter(app => app.knownWarning);
  const regressions = result.delta?.changes?.filter(change => change.type === 'regression') || [];
  const focus = blockers.length
    ? blockers
    : regressions.length
      ? result.apps.filter(app => regressions.some(change => change.id === app.id))
      : newWarnings.length
        ? newWarnings
        : knownWarnings;
  const verdict = blockers.length
    ? 'blocker'
    : regressions.length
      ? 'regression'
      : newWarnings.length
        ? 'investigate'
        : knownWarnings.length
          ? 'known-warning'
          : 'clear';
  return {
    contractVersion: 1,
    verdict,
    baseline: result.delta?.available ? result.delta.status : 'missing',
    headline: focus[0]
      ? focus[0].id + ': ' + focus[0].issueCode + ' - ' + focus[0].reason
      : 'All monitored apps are clear.',
    reviewOrder: focus.map(app => app.id).concat(
      result.apps
        .filter(app => !focus.some(item => item.id === app.id))
        .map(app => app.id)
    ),
    blockers: blockers.map(app => ({ id: app.id, issueCode: app.issueCode, hint: app.healerHint })),
    regressions,
    knownWarnings: knownWarnings.map(app => ({ id: app.id, issueCode: app.issueCode, reason: app.reason })),
    nextAction: blockers.length
      ? 'Fix blocking diagnostics first, then rerun Watchtower.'
      : regressions.length
        ? 'Inspect regression apps before touching unrelated code.'
        : newWarnings.length
          ? 'Triage new warnings and decide whether they are expected.'
          : result.delta?.available
            ? 'No urgent action. Keep baseline if this is the intended state.'
      : 'Save a baseline so future AI runs can detect regressions.',
  };
}


function buildActionPacket(result = {}) {
  const aiBrief = result?.aiBrief || {};
  const focus = result?.workbench?.focus || null;
  const focusId = focus?.id || aiBrief.reviewOrder?.[0] || null;
  const focusApp = focus || result?.apps?.find(app => app.id === focusId) || null;
  const config = APPS.find(app => app.id === focusId) || null;
  const safety = config?.safety || WATCHTOWER_CONFIG.agent.safetyDefaults;
  const verdict = aiBrief.verdict || 'unknown';
  const baseline = result?.delta?.available ? result.delta.status : 'missing';
  const editBudget = result?.editBudget || buildEditBudget(result);
  const forbiddenSurfaceMap = result?.forbiddenSurfaceMap || (result?.apps ? buildForbiddenSurfaceMap(result) : null);
  const mission = verdict === 'blocker'
    ? 'fix-blocker'
    : verdict === 'regression'
      ? 'fix-regression'
      : verdict === 'investigate'
        ? 'triage-warning'
        : verdict === 'known-warning'
          ? 'respect-known-warning'
          : verdict === 'clear'
            ? (baseline === 'missing' ? 'prepare-baseline-candidate' : 'preserve-clear-state')
            : 'inspect-watchtower';
  const priority = verdict === 'blocker'
    ? 100
    : verdict === 'regression'
      ? 90
      : verdict === 'investigate'
        ? 70
        : verdict === 'known-warning'
          ? 40
          : 20;
  const allowedActions = verdict === 'clear'
    ? ['rerun', 'compare-baseline', 'prepare-handoff']
    : ['inspect', 'edit', 'rerun', 'compare-baseline', 'prepare-handoff'];
  const forbiddenActions = [
    'approval-write',
    'unrelated-edits',
    'danger-zone-edits-without-explicit-intent',
  ];
  if (verdict !== 'clear') forbiddenActions.push('baseline-update');
  const successCondition = [];
  if (verdict === 'blocker') successCondition.push('focus-app-level!=bad');
  if (verdict === 'regression') successCondition.push('delta.status!=regression');
  if (verdict === 'investigate') successCondition.push('warning-fixed-or-classified');
  if (verdict === 'known-warning') successCondition.push('no-new-warnings');
  if (verdict === 'clear') successCondition.push(baseline === 'missing' ? 'owner-may-save-baseline' : 'clear-state-preserved');
  successCondition.push('watchtower-rerun-complete');
  successCondition.push('signature-recorded');
  const targetArea = focusApp
    ? [
        focusApp.issueCode || focusApp.reason || 'diagnostics-focus',
        ...((safety.safe || []).slice(0, 2)),
        ...((safety.medium || []).slice(0, 1)),
      ]
    : ['suite-summary', 'aiBrief.reviewOrder', 'focusPacket.doNow'];
  return {
    contractVersion: 1,
    packetType: 'watchtower.action',
    mission,
    priority,
    targetApp: focusId,
    targetUrl: focusApp?.url || null,
    targetArea,
    protectedSurface: [...(safety.danger || [])],
    why: aiBrief.headline || result?.status || 'Inspect current Watchtower result.',
    summary: aiBrief.nextAction || 'Run Watchtower and inspect the top review target.',
    allowedActions,
    forbiddenActions,
    editBudget,
    forbiddenSurfaceMap: forbiddenSurfaceMap ? {
      mapType: forbiddenSurfaceMap.mapType,
      focusApp: forbiddenSurfaceMap.focusApp,
      defaultRule: forbiddenSurfaceMap.defaultRule,
      surfaces: forbiddenSurfaceMap.surfaces.map(surface => ({
        id: surface.id,
        appId: surface.appId,
        forbidden: surface.forbidden,
        requiresExplicitUserIntent: surface.requiresExplicitUserIntent,
      })),
    } : null,
    requiredChecks: [
      'window.WATCHTOWER.run()',
      ...(focusId ? ['Inspect focus app: ' + focusId] : []),
      'Compare against baseline before handoff',
    ],
    successCondition,
    retryPolicy: {
      maxAttempts: verdict === 'clear' ? 1 : 3,
      backoff: verdict === 'blocker' ? 'short' : 'minimal',
    },
    handoffKey: [
      WATCHTOWER_CONFIG.baselineNamespace,
      focusId || 'suite',
      result?.signature || 'unsigned',
    ].join(':'),
    signature: result?.signature || null,
    baseline,
    generatedAt: result?.generatedAt || new Date().toISOString(),
  };
}

function getActionPacket(result = null) {
  if (result && typeof result === 'object') {
    return result.actionPacket || buildActionPacket(result);
  }
  try {
    const parsed = JSON.parse(jsonEl?.textContent || 'null');
    return parsed ? (parsed.actionPacket || buildActionPacket(parsed)) : null;
  } catch (_) {
    return null;
  }
}

function buildAgentCard(result) {
  const agent = WATCHTOWER_CONFIG.agent;
  return {

    contractVersion: agent.contractVersion,
    audience: agent.audience,

function buildWorkbench(result) {
  const gates = WATCHTOWER_CONFIG.agent.gates;
  const focusId = result.aiBrief?.reviewOrder?.[0] || null;
  const focusApp = result.apps.find(app => app.id === focusId) || null;
  const regressionIds = (result.delta?.changes || [])
    .filter(change => change.type === 'regression')
    .map(change => change.id);
  const editMode = result.aiBrief?.verdict === 'blocker' || result.aiBrief?.verdict === 'regression'
    ? 'repair-first'
    : result.aiBrief?.verdict === 'known-warning'
      ? 'changes-allowed-with-baseline'
      : 'changes-allowed';
  return {
    contractVersion: 1,
    purpose: 'AI coding workbench for project diagnostics, repair focus, and completion gates.',
    editMode,
    focus: focusApp ? {
      id: focusApp.id,
      title: focusApp.title,
      url: focusApp.url,
      level: focusApp.level,
      issueCode: focusApp.issueCode,
      knownWarning: focusApp.knownWarning,
      reason: focusApp.reason,
      healerHint: focusApp.healerHint,
    } : null,
    queues: {
      repair: result.apps
        .filter(app => app.level === 'bad' || regressionIds.includes(app.id))
        .map(app => app.id),
      triage: result.apps
        .filter(app => app.level === 'warn' && !app.knownWarning)
        .map(app => app.id),
      acknowledged: result.apps
        .filter(app => app.knownWarning)
        .map(app => app.id),
    },
    gates: {
      start: [...gates.start],
      beforeEdit: [...gates.beforeEdit],
      afterEdit: [...gates.afterEdit],
      complete: [...gates.complete],
    },
    acceptance: {
      canFinish: result.ok && result.delta?.status !== 'regression',
      reason: result.ok
        ? result.delta?.status === 'regression'
          ? 'Current suite is usable, but it regressed from baseline.'
          : 'No blockers or new warnings detected.'
        : 'Blockers or new warnings remain.',
      requiredNextCommand: 'Run Watchtower again and inspect workbench.acceptance before handing off.',
    },
    handoff: {
      summary: result.aiBrief?.headline || result.status,
      status: result.status,
      baseline: result.delta?.available ? result.delta.status : 'missing',
      signature: result.signature,
      nextAction: result.aiBrief?.nextAction,
    },
  };
}

function buildSafetyMap(result) {
  const defaults = WATCHTOWER_CONFIG.agent.safetyDefaults;
  return {
    contractVersion: 1,
    project: result.project.title,
    apps: result.apps.map(app => {
      const config = APPS.find(item => item.id === app.id);
      const safety = config?.safety || defaults;
      const risk = app.level === 'bad'
        ? 'danger'
        : app.level === 'warn' && !app.knownWarning
          ? 'medium'
          : app.knownWarning
            ? 'medium-known'
            : 'normal';
      return {
        id: app.id,
        title: app.title,
        risk,
        safe: [...(safety.safe || defaults.safe)],
        medium: [...(safety.medium || defaults.medium)],
        danger: [...(safety.danger || defaults.danger)],
        requiredChecks: app.kind === 'cc'
          ? ['CC_TEST_HARNESS.run()', 'SpecCatalog.run', 'SiegeTests.run']
          : app.kind === 'wc'
            ? ['WcDiagnostics.runDiagnostics({ preset: "quick" })']
            : app.kind === 'cd'
              ? ['AppDiagnostics.runSmokeChecks({ preset: "edit" })']
              : app.kind === 'ect'
                ? ['AppDiagnostics.runSmokeChecks()']
                : ['window.WATCHTOWER.run()'],
      };
    }),
  };
}

function buildEditBudget(result = {}) {
  const verdict = result.aiBrief?.verdict || 'unknown';
  const focusId = result.workbench?.focus?.id || result.aiBrief?.reviewOrder?.[0] || null;
  const config = WATCHTOWER_CONFIG.agent.editBudgets[verdict] || WATCHTOWER_CONFIG.agent.editBudgets.investigate;
  const focusApp = result.apps?.find(app => app.id === focusId) || null;
  const hasBlocker = (result.apps || []).some(app => app.level === 'bad');
  const hasRegression = result.delta?.status === 'regression';
  const baseline = result.delta?.available ? result.delta.status : 'missing';
  const mustAskHuman = hasRegression || verdict === 'clear' || baseline === 'missing';
  const allowedScopes = focusId
    ? [focusId]
    : (result.aiBrief?.reviewOrder || []).slice(0, 1);
  return {
    contractVersion: 1,
    budgetType: 'watchtower.editBudget',
    verdict,
    level: config.level,
    maxFiles: config.maxFiles,
    maxRisk: config.maxRisk,
    maxAttempts: config.maxAttempts,
    focusApp: focusId,
    allowedScopes,
    allowedChangeTypes: verdict === 'clear'
      ? ['diagnostics-rerun', 'handoff-only']
      : ['targeted-fix', 'diagnostics-addition', 'small-label-or-report-copy-change'],
    requiresHumanApprovalBefore: mustAskHuman
      ? ['baseline-update', 'approval-write', 'danger-zone-edit']
      : ['approval-write', 'danger-zone-edit'],
    stopIf: [
      'touches-human-button-contract',
      'changes-unrelated-app',
      'requires-more-than-' + config.maxFiles + '-files',
      hasBlocker ? 'new-blocker-appears' : 'blocker-appears',
    ],
    rationale: focusApp
      ? 'Limit edits to ' + focusApp.id + ' because Watchtower focus is ' + focusApp.issueCode + '.'
      : 'No focus app selected; inspect only until Watchtower identifies a target.',
    generatedAt: result.generatedAt || new Date().toISOString(),
  };
}

function buildCleanupCandidates(result = {}) {
  const candidates = [];
  const source = document.documentElement.outerHTML || '';
  const domHasRetiredControls = ['suggest-actions', 'copy-action-packet', 'copy-handoff']
    .some(id => !!document.getElementById(id));
  const missingLegacyHelpers = ['attachMvpControls', 'buildSuggestionPanelText', 'copyAgentHandoff']
    .filter(name => typeof window.WATCHTOWER?.[name] !== 'function');
  if (!domHasRetiredControls && missingLegacyHelpers.length === 3) {
    candidates.push({
      id: 'retired-mvp-controls',
      kind: 'already-clean',
      confidence: 'high',
      safeToRemoveNow: false,
      target: 'legacy MVP action buttons and helper APIs',
      reason: 'The old human-facing AI helper buttons are gone and their public helper APIs are no longer exposed.',
      action: 'Do not restore them. Keep only suggestNextActions because machineReadable.suggestedActions still uses it.',
      evidence: missingLegacyHelpers,
    });
  } else if (domHasRetiredControls) {
    candidates.push({
      id: 'retired-mvp-controls-returned',
      kind: 'remove',
      confidence: 'high',
      safeToRemoveNow: true,
      target: 'suggest-actions / copy-action-packet / copy-handoff DOM controls',
      reason: 'These are retired AI UI controls and conflict with HUMAN_BUTTON_CONTRACT.',
      action: 'Remove the returned DOM controls unless the human explicitly asked to restore them.',
      evidence: ['retired DOM control detected'],
    });
  }

  const portable = WATCHTOWER_CONFIG.agent.portableMode;
  candidates.push({
    id: 'optional-guide-files',
    kind: 'omit-when-porting',
    confidence: 'high',
    safeToRemoveNow: false,
    target: portable.optionalFiles.join(', '),
    reason: 'Watchtower is self-contained; these files are discovery notes, not runtime dependencies.',
    action: 'When copying Watchtower to another project, copy only ' + portable.primaryFile + ' unless the human wants extra guide files.',
    evidence: ['requiredFiles=' + portable.requiredFiles.join(',')],
  });

  const sessionLog = readSessionLogSummary(3);
  if (sessionLog.total >= Math.floor(SESSION_LOG_MAX * 0.8)) {
    candidates.push({
      id: 'session-log-near-cap',
      kind: 'storage-housekeeping',
      confidence: 'medium',
      safeToRemoveNow: false,
      target: 'localStorage ' + SESSION_LOG_KEY,
      reason: 'The work log is near its cap and old entries will be trimmed automatically.',
      action: 'Keep recent entries. Use resetSessionLog() only if the human asks to clear history.',
      evidence: ['entries=' + sessionLog.total, 'max=' + SESSION_LOG_MAX],
    });
  }

  if (source.includes('generateReadme(result)')) {
    candidates.push({
      id: 'generated-readme-is-optional',
      kind: 'keep-as-generator',
      confidence: 'medium',
      safeToRemoveNow: false,
      target: 'generateReadme(result)',
      reason: 'README generation is optional but useful when an external guide is requested.',
      action: 'Do not create or require README.md for normal Watchtower portability.',
      evidence: ['agentGuide is embedded in machineReadable'],
    });
  }

  return {
    contractVersion: 1,
    generatedAt: new Date().toISOString(),
    policy: 'Report cleanup candidates only. Do not delete code or files unless the human explicitly asks.',
    candidates,
    summary: candidates.length
      ? candidates.map(item => item.id + ':' + item.kind).join(', ')
      : 'No cleanup candidates detected.',
  };
}

function parseReportMetrics(report = '') {
  const metrics = {};
  String(report || '').split('\n').forEach(line => {
    const match = line.match(/^\s*-\s*([^:]+):\s*(.+)\s*$/);
    if (!match) return;
    const key = match[1].trim().replace(/\s+/g, '_');
    metrics[key] = match[2].trim();
  });
  return metrics;
}

function buildDiagnosticCapabilityMap(result = {}) {
  return (result.apps || []).map(app => {
    const config = APPS.find(item => item.id === app.id) || {};
    const diagnostics = config.diagnostics || {};
    const report = String(app.report || '');
    const badges = [];
    const protocol = diagnostics.protocol || 'basic';
    if (protocol) badges.push(protocol);
    if (/runDiagnostics|Status:\s*OK|Checks:/i.test(report) || (diagnostics.methods || []).includes('runDiagnostics')) badges.push('standard-api');
    if (/calculation|spec|regression|Calculation/i.test(report)) badges.push('calculation');
    if (/storage|localStorage|IndexedDB|storedRecords/i.test(report)) badges.push('storage');
    if (/import|export|JSON|CSV|transfer/i.test(report)) badges.push('import-export');
    if (/DOM|dom|UI public API|publicApi/i.test(report)) badges.push('dom-ui');
    if (/guide|afterEdit|Next command/i.test(report)) badges.push('agent-guide');
    return {
      id: app.id,
      title: app.title,
      protocol,
      maturity: app.maturity,
      preset: diagnostics.preset || WATCHTOWER_CONFIG.diagnosticDefaults.presets[app.kind] || null,
      globals: diagnostics.globals || diagnostics.global || WATCHTOWER_CONFIG.diagnosticDefaults.standardGlobals,
      methods: diagnostics.methods || WATCHTOWER_CONFIG.diagnosticDefaults.standardMethods,
      badges: [...new Set(badges)],
      requiredChecks: buildSafetyMap(result).apps.find(item => item.id === app.id)?.requiredChecks || [],
    };
  });
}

function buildAppMetrics(result = {}) {
  return (result.apps || []).map(app => {
    const metrics = parseReportMetrics(app.report);
    const keyMetrics = Object.entries(metrics)
      .filter(([key]) => /records|stored|failures|warnings|checks|selected|public|storage|metrics|required|max/i.test(key))
      .slice(0, 6);
    return {
      id: app.id,
      metrics,
      summary: keyMetrics.length
        ? keyMetrics.map(([key, value]) => key + '=' + value).join(', ')
        : app.level + '/' + app.issueCode,
    };
  });
}
