<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0d1117">
<title>COIL TOOLS</title>
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" href="./icons/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="./icons/icon-180.png">
<style>
:root {
  --bg:#0d1117;
  --surface:#161b22;
  --surface2:#1c2333;
  --border:#30363d;
  --accent:#58a6ff;
  --accent2:#3fb950;
  --accent3:#f78166;
  --gold:#e3b341;
  --text:#e6edf3;
  --muted:#8b949e;
}
*, *::before, *::after { box-sizing:border-box; }
body {
  min-height:100vh;
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:'Noto Sans JP', system-ui, sans-serif;
}
.shell {
  max-width:760px;
  margin:0 auto;
  padding:22px 16px 32px;
}
.top {
  display:flex;
  align-items:center;
  gap:14px;
  padding:12px 0 18px;
  border-bottom:1px solid var(--border);
}
.mark {
  display:grid;
  place-items:center;
  width:48px;
  height:48px;
  border:1px solid var(--border);
  border-radius:8px;
  background:var(--surface);
  color:var(--gold);
  font-weight:900;
}
h1 {
  margin:0;
  color:var(--accent);
  font-size:22px;
  letter-spacing:.8px;
}
.sub {
  margin:4px 0 0;
  color:var(--muted);
  font-size:12px;
}
.apps {
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(132px, 1fr));
  gap:12px;
  margin-top:18px;
}
.app {
  display:flex;
  flex-direction:column;
  gap:8px;
  min-height:132px;
  padding:14px;
  border:1px solid var(--border);
  border-radius:8px;
  background:var(--surface);
  color:var(--text);
  text-decoration:none;
}
.app strong {
  font-size:18px;
  color:var(--accent);
}
.app span {
  color:var(--muted);
  font-size:12px;
  line-height:1.55;
}
.app small {
  margin-top:auto;
  color:var(--gold);
  font-weight:800;
}
.status {
  margin-top:16px;
  padding:10px 12px;
  border:1px solid var(--border);
  border-radius:8px;
  background:var(--surface2);
  color:var(--muted);
  font-size:12px;
  line-height:1.6;
}
@media (max-width:700px) {
  .apps { grid-template-columns:1fr; }
}
</style>
</head>
<body>
<main class="shell">
  <header class="top">
    <div class="mark">CT</div>
    <div>
      <h1>COIL TOOLS</h1>
      <p class="sub">GitHub Pages / PWA launcher</p>
    </div>
  </header>
  <section class="apps" aria-label="アプリ一覧">
    <a class="app" href="./winding-calibrator.html">
      <strong>WC</strong>
      <span>WINDING CALIBRATOR</span>
      <small>開く</small>
    </a>
    <a class="app" href="./coil-designer.html">
      <strong>CD</strong>
      <span>COIL DESIGNER</span>
      <small>開く</small>
    </a>
    <a class="app" href="./coil-calibrator.html">
      <strong>CC</strong>
      <span>COIL CALIBRATOR</span>
      <small>開く</small>
    </a>
    <a class="app" href="./watchtower.html">
      <strong>WATCH</strong>
      <span>COIL TOOLS WATCHTOWER</span>
      <small>検査</small>
    </a>
    <a class="app" href="./ect-designer.html">
      <strong>ECT-D</strong>
      <span>ECT DESIGNER</span>
      <small>開く</small>
    </a>
  </section>
  <div class="status" id="pwaStatus">初回オンライン読み込み後、ホーム画面から起動できます。</div>
</main>
<script>
if ('serviceWorker' in navigator && location.protocol !== 'file:') {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(() => {
        const el = document.getElementById('pwaStatus');
        if (el) el.textContent = 'PWAキャッシュ準備OK。WC / CD / CC / ECT-D をホーム画面から起動できます。';
      })
      .catch(() => {});
  });
}
</script>
</body>
</html>
